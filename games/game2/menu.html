<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表裏陣取り</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F4F1;
    --surface:#FFFFFF;
    --ink:#1C1C1A;
    --muted:#8C8B83;
    --faint:#B6B5AD;
    --line:#E6E5DF;
    --line-strong:#D7D6CE;
    --p0:#2E4B8F;
    --p0-soft:#E7ECF6;
    --p0-glow:rgba(46,75,143,.22);
    --p1:#B14A33;
    --p1-soft:#F7E9E4;
    --p1-glow:rgba(177,74,51,.22);
    --accent:#1C1C1A;
    --shadow:0 1px 2px rgba(28,28,26,.05),0 8px 24px rgba(28,28,26,.06);
    --r:14px;
    --serif:"Noto Serif JP","Hiragino Mincho ProN",serif;
    --sans:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic Medium",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.6;
    display:flex;justify-content:center;align-items:center;min-height:100vh;
  }
  #app{width:100%;max-width:520px;padding:24px 18px 60px;display:flex;flex-direction:column;align-items:center}

  /* タイトル */
  .title-wrap{text-align:center;padding:30px 0;width:100%}
  .title-mark{width:104px;height:104px;margin:0 auto 26px;position:relative}
  .title-coin{
    position:absolute;width:74px;height:74px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:30px;box-shadow:var(--shadow);
  }
  .title-coin.front{background:var(--p0);color:#fff;left:0;top:0;z-index:2}
  .title-coin.back{background:#fff;color:var(--p1);border:2px solid var(--p1);right:0;bottom:0}
  .eyebrow{font-size:11px;letter-spacing:.28em;color:var(--muted);font-weight:500;margin-bottom:6px}
  h1.title{font-family:var(--serif);font-weight:700;font-size:40px;letter-spacing:.06em;margin-bottom:10px}
  .subtitle{color:var(--muted);font-size:14px;margin-bottom:40px;line-height:1.7}

  /* モード選択カード */
  .mode-cards{display:flex;flex-direction:column;gap:14px;width:100%;margin-bottom:28px}
  .mode-card{
    background:var(--surface);border:1.5px solid var(--line);border-radius:16px;
    padding:22px 24px;cursor:pointer;text-align:left;
    box-shadow:var(--shadow);
    transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    display:flex;align-items:center;gap:20px;
    text-decoration:none;color:inherit;
  }
  .mode-card:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(28,28,26,.08),0 16px 40px rgba(28,28,26,.09);
  }
  .mode-card:active{transform:translateY(0)}
  .mode-card.offline:hover{border-color:var(--p0)}
  .mode-card.online:hover{border-color:var(--p1)}

  .mode-card-icon{
    width:56px;height:56px;border-radius:14px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:26px;
  }
  .mode-card.offline .mode-card-icon{background:var(--p0-soft)}
  .mode-card.online  .mode-card-icon{background:var(--p1-soft)}

  .mode-card-body{flex:1;min-width:0}
  .mode-card-title{
    font-family:var(--serif);font-size:20px;font-weight:700;
    letter-spacing:.04em;margin-bottom:4px;
  }
  .mode-card.offline .mode-card-title{color:var(--p0)}
  .mode-card.online  .mode-card-title{color:var(--p1)}
  .mode-card-desc{font-size:13px;color:var(--muted);line-height:1.6}

  .mode-card-arrow{
    color:var(--faint);font-size:20px;flex-shrink:0;
    transition:transform .14s ease, color .14s ease;
  }
  .mode-card:hover .mode-card-arrow{transform:translateX(3px);color:var(--ink)}

  /* コイン2枚 */
  .coin-pair{
    display:flex;gap:6px;align-items:center;flex-shrink:0;
    width:52px;justify-content:center;
  }
  .mini-coin{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:10px;font-weight:700;
    box-shadow:0 1px 3px rgba(28,28,26,.15);
  }
  .mini-coin.front{background:var(--p0);color:#fff}
  .mini-coin.back{background:#fff;color:var(--p1);border:1.5px solid var(--p1)}

  /* オンラインバッジ */
  .online-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--p1-soft);color:var(--p1);
    font-size:11px;font-weight:700;letter-spacing:.06em;
    border-radius:20px;padding:2px 9px;margin-top:6px;
  }
  .online-dot{width:6px;height:6px;border-radius:50%;background:var(--p1);animation:pulse-dot 1.6s ease infinite}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

  /* フッタリンク */
  .footer-links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .link{
    background:none;border:none;color:var(--muted);font-size:13px;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;
    font-family:var(--sans);padding:4px 2px;
    transition:color .12s;
  }
  .link:hover{color:var(--ink)}

  /* アニメーション */
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .title-wrap{animation:fadeUp .4s ease both}
  .mode-cards{animation:fadeUp .4s .08s ease both}
  .footer-links{animation:fadeUp .4s .14s ease both}
</style>
</head>
<body>
<div id="app">
  <div class="title-wrap">
    <div class="title-mark">
      <div class="title-coin front">表</div>
      <div class="title-coin back">裏</div>
    </div>
    <div class="eyebrow">4×4 一対一ボードゲーム</div>
    <h1 class="title">表裏陣取り</h1>
    <p class="subtitle">コインの向きを操り、同じ向き3枚を揃える。<br>全3ゲームの合計点で競う。</p>
  </div>

  <div class="mode-cards">
    <a class="mode-card offline" href="offline/index.html">
      <div class="mode-card-icon">
        <div class="coin-pair">
          <div class="mini-coin front">表</div>
          <div class="mini-coin back">裏</div>
        </div>
      </div>
      <div class="mode-card-body">
        <div class="mode-card-title">オフライン対戦</div>
        <div class="mode-card-desc">CPUまたは同じ端末で2人対戦。<br>ネット接続不要でいつでも遊べる。</div>
      </div>
      <div class="mode-card-arrow">›</div>
    </a>

    <a class="mode-card online" href="online/index.html">
      <div class="mode-card-icon" style="font-size:28px">🌐</div>
      <div class="mode-card-body">
        <div class="mode-card-title">オンライン対戦</div>
        <div class="mode-card-desc">世界中のプレイヤーとリアルタイム対戦。戦績が記録される。</div>
        <div class="online-badge"><span class="online-dot"></span>ONLINE</div>
      </div>
      <div class="mode-card-arrow">›</div>
    </a>
  </div>

  <div class="footer-links">
    <button class="link" onclick="showRules()">ルールを読む</button>
  </div>
</div>

<!-- ルールモーダル（ゲームと同じ内容） -->
<script>
function showRules(){
  const bg=document.createElement('div');
  bg.style.cssText='position:fixed;inset:0;background:rgba(28,28,26,.45);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px';
  bg.innerHTML=`
    <div style="background:#fff;border-radius:18px;padding:28px 24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(28,28,26,.18)">
      <h3 style="font-family:'Noto Serif JP',serif;font-size:20px;margin-bottom:12px">表裏陣取り ルール</h3>
      <p style="font-size:13px;color:#555;margin-bottom:14px;line-height:1.7">4×4の盤面に、表・裏のあるコインを置き合う一対一ゲーム。<b>同じ向き・同じ持ち主のコインを縦横斜めに3枚揃える</b>ことを狙います。全3ゲームの合計点で勝敗を決めます。</p>
      <h4 style="font-size:14px;margin-bottom:8px;margin-top:16px">手番の行動（1つ選ぶ）</h4>
      <ul style="font-size:13px;color:#555;line-height:1.8;padding-left:18px">
        <li><b>コインを置く</b>：コイントスで出た面のまま空きマスへ。</li>
        <li><b>裏返す</b>：盤上の自分のコイン1枚の向きを変える。使用後1ターンは再使用できない。</li>
        <li><b>カードを使う</b>：手札のカードを1枚使用する。</li>
      </ul>
      <h4 style="font-size:14px;margin-bottom:8px;margin-top:16px">終了条件</h4>
      <ul style="font-size:13px;color:#555;line-height:1.8;padding-left:18px">
        <li>どちらかが3組以上揃えた時点でゲーム終了。</li>
        <li>各プレイヤーのコインが8枚全て置かれた時点でも終了。</li>
      </ul>
      <h4 style="font-size:14px;margin-bottom:8px;margin-top:16px">得点</h4>
      <ul style="font-size:13px;color:#555;line-height:1.8;padding-left:18px">
        <li>同じ向き3枚連続＝3点（4枚連続は6点）。複数ラインは別々に加算。</li>
        <li>未使用カード1枚につき1点（『中断』使用者は0点）。</li>
      </ul>
      <div style="text-align:center;margin-top:24px">
        <button onclick="this.closest('[style*=fixed]').remove()" style="font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;color:#fff;background:#1C1C1A;border:none;border-radius:10px;padding:12px 32px;cursor:pointer">閉じる</button>
      </div>
    </div>`;
  bg.onclick=e=>{ if(e.target===bg) bg.remove(); };
  document.body.appendChild(bg);
}
</script>
</body>
</html>
