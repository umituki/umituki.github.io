/* ---- ユーザー管理 ---- */
const LS_USER = 'omote_user';

function loadLocalUser(){
  try { return JSON.parse(localStorage.getItem(LS_USER)); } catch{ return null; }
}
function saveLocalUser(u){ localStorage.setItem(LS_USER, JSON.stringify(u)); }

async function generateId(name){
  for(let i=0;i<20;i++){
    const id = String(Math.floor(Math.random()*900)+100);
    const docId = `${name}_${id}`;
    const snap = await getDoc(doc(db,'users', docId));
    if(!snap.exists()) return {id, docId};
  }
  const id = String(Math.floor(Math.random()*9000)+1000);
  return {id, docId:`${name}_${id}`};
}

async function createUser(name){
  const {id, docId} = await generateId(name);
  const user = {name, id, docId, wins:0, losses:0, draws:0, streak:0, history:[]};
  await setDoc(doc(db,'users', docId), {
    name, id, wins:0, losses:0, draws:0, streak:0, history:[], createdAt:serverTimestamp()
  });
  saveLocalUser(user);
  return user;
}

async function transferUser(name, id){
  const candidateDocId = `${name}_${id}`;
  const snap = await getDoc(doc(db,'users', candidateDocId));
  if(snap.exists()){
    const data = snap.data();
    const user = {...data, docId: candidateDocId};
    saveLocalUser(user);
    return user;
  }
  return null;
}

/* ---- マッチング ---- */
let _roomUnsub = null;
let _queueUnsub = null;
let _queueTimeout = null;
let _matchmakingActive = false;
const QUEUE_STALE_MS = 120000;
let _heartbeatTimer = null;
const HEARTBEAT_MS = 15000;
const HEARTBEAT_STALE_MS = 45000;
function _stopHeartbeat(){
  if(_heartbeatTimer){ clearInterval(_heartbeatTimer); _heartbeatTimer=null; }
}
function _lastSeenPatch(role){
  return {
    ['lastSeen.p'+role]: Date.now(),
    ['lastSeenAt.p'+role]: serverTimestamp()
  };
}
function _startHeartbeat(roomRef, role){
  _stopHeartbeat();
  const beat=()=>{
    if(!S.roomId || S.myRole===null || ['title','matchmaking','final'].includes(S.phase)) return;
    updateDoc(roomRef, _lastSeenPatch(role)).catch(()=>{});
  };
  beat();
  _heartbeatTimer=setInterval(beat, HEARTBEAT_MS);
}
function _isOpponentStale(data, myRole){
  if(!data || !data.lastSeen) return false;
  const opp = myRole===0 ? 1 : 0;
  const v = data.lastSeen['p'+opp];
  return typeof v === 'number' && Date.now() - v > HEARTBEAT_STALE_MS;
}

async function joinMatchQueue(){
  const user = loadLocalUser();
  if(!user){ toastMsg('先にユーザー登録が必要です'); return; }
  if(_matchmakingActive){ toastMsg('すでに対戦相手を探しています'); return; }
  _matchmakingActive = true;

  const active = _loadActiveRoom();
  if(active && active.roomId){
    try {
      const rsnap = await getDoc(doc(db,'rooms', active.roomId));
      if(rsnap.exists() && !['abandoned','finished','surrendered'].includes(rsnap.data().status)){
        toastMsg('進行中の試合に再接続します…');
        _matchmakingActive = false;
        _subscribeRoom(active.roomId, active.myRole, true);
        return;
      } else {
        _clearActiveRoom();
      }
    } catch(e){ _clearActiveRoom(); }
  }

  S.phase = 'matchmaking'; render();

  const queueRef = doc(db, 'matchQueue', 'waiting');

  let matched = null;
  try {
    await runTransaction(db, async(tx)=>{
      const snap = await tx.get(queueRef);
      const now = Date.now();
      let valid = false;
      if(snap.exists()){
        const d = snap.data();
        const joinedMs = d.joinedAtMs || 0;
        valid = d.userId !== user.docId && (now - joinedMs) < QUEUE_STALE_MS;
      }
      if(valid){
        matched = snap.data();
        tx.delete(queueRef);
      } else {
        tx.set(queueRef, {
          userId: user.docId,
          userName: user.name,
          joinedAtMs: now,
          joinedAt: serverTimestamp()
        });
        matched = null;
      }
    });
  } catch(e){
    console.error('マッチングtx失敗', e);
    _matchmakingActive = false;
    toastMsg('マッチングに失敗しました。再度お試しください。');
    newMatch(); render(); return;
  }

  if(matched){
    try {
      await _createRoom(matched, user);
    } catch(e){
      console.error('ルーム作成失敗', e);
      _matchmakingActive = false;
      toastMsg('ルーム作成に失敗しました。再度お試しください。');
      newMatch(); render();
    }
  } else {
    _queueUnsub = onSnapshot(queueRef, async(snap2)=>{
      if(!snap2.exists()){
        if(_queueUnsub){ _queueUnsub(); _queueUnsub=null; }
        clearTimeout(_queueTimeout);
        setTimeout(()=>_findMyRoom(user), 400);
      }
    });
    _queueTimeout = setTimeout(async()=>{
      if(_queueUnsub){ _queueUnsub(); _queueUnsub=null; }
      try {
        await runTransaction(db, async(tx)=>{
          const s = await tx.get(queueRef);
          if(s.exists() && s.data().userId === user.docId) tx.delete(queueRef);
        });
      } catch(e){}
      _matchmakingActive = false;
      toastMsg('タイムアウト：対戦相手が見つかりませんでした');
      newMatch(); render();
    }, 60000);
    const mmStatus = document.getElementById('mm-status');
    if(mmStatus) mmStatus.textContent = '対戦相手を待っています…';
  }
}

async function _findMyRoom(user, retries=0){
  const pendingRef = doc(db, 'matchQueue', 'pending_' + user.docId);
  const waitingSnap = await getDoc(pendingRef);
  if(waitingSnap.exists()){
    const {roomId} = waitingSnap.data();
    await deleteDoc(pendingRef);
    if(roomId){
      const roomSnap = await getDoc(doc(db, 'rooms', roomId));
      if(roomSnap.exists() && !['abandoned','finished','surrendered'].includes(roomSnap.data().status)){
        _matchmakingActive = false;
        _subscribeRoom(roomId, 0);
        return;
      }
    }
    _matchmakingActive = false;
    toastMsg('作成された試合が見つかりませんでした。もう一度お試しください。');
    newMatch(); render();
  } else if(retries < 10){
    setTimeout(()=>_findMyRoom(user, retries+1), 500);
  } else {
    _matchmakingActive = false;
    toastMsg('マッチング処理に失敗しました。もう一度お試しください。');
    newMatch(); render();
  }
}

async function _createRoom(p0, p1){
  const roomId = Date.now().toString(36) + Math.random().toString(36).slice(2,6);

  await setDoc(doc(db, 'rooms', roomId), {
    p0: {userId: p0.userId, userName: p0.userName},
    p1: {userId: p1.docId, userName: p1.name},
    status: 'playing',
    gameIndex: 0,
    totals: [0,0],
    gameLog: [],
    lastAction: null,
    lastActionId: null,
    disconnected: null,
    lastSeen: {p0: Date.now(), p1: Date.now()},
    lastSeenAt: {p0: serverTimestamp(), p1: serverTimestamp()},
    createdAt: serverTimestamp()
  });

  await setDoc(doc(db, 'matchQueue', 'pending_' + p0.userId), {roomId});

  _subscribeRoom(roomId, 1);
}

async function leaveQueue(){
  const user = loadLocalUser();
  _matchmakingActive = false;
  if(_queueUnsub){ _queueUnsub(); _queueUnsub=null; }
  clearTimeout(_queueTimeout);
  try {
    const waitingRef = doc(db,'matchQueue','waiting');
    await runTransaction(db, async(tx)=>{
      const snap = await tx.get(waitingRef);
      if(user && snap.exists() && snap.data().userId === user.docId){
        tx.delete(waitingRef);
      }
    });
    if(user){
      try { await deleteDoc(doc(db,'matchQueue','pending_' + user.docId)); } catch(e){}
    }
  } catch(e){ console.warn('キュー退出処理に失敗', e); }
}

/* ---- ルーム購読・受信 ---- */
const LS_ACTIVE_ROOM = 'omote_activeRoom';
function _saveActiveRoom(roomId, myRole){
  try { localStorage.setItem(LS_ACTIVE_ROOM, JSON.stringify({roomId, myRole})); } catch(e){}
}
function _clearActiveRoom(){
  try { localStorage.removeItem(LS_ACTIVE_ROOM); } catch(e){}
}
function _loadActiveRoom(){
  try { return JSON.parse(localStorage.getItem(LS_ACTIVE_ROOM)); } catch(e){ return null; }
}

async function _subscribeRoom(roomId, myRole, isRejoin=false){
  _matchmakingActive = false;
  if(_queueUnsub){ _queueUnsub(); _queueUnsub=null; }
  clearTimeout(_queueTimeout);
  if(_roomUnsub){ _roomUnsub(); _roomUnsub=null; }
  _stopHeartbeat();
  if(window._onBeforeUnload){
    window.removeEventListener('beforeunload', window._onBeforeUnload);
    window._onBeforeUnload = null;
  }
  clearTimeout(_turnWatchdog);
  S.roomId = roomId;
  S.myRole = myRole;
  _saveActiveRoom(roomId, myRole);

  // ★重要：onSnapshot を登録する前に、await で初回状態の初期化を完了させる。
  // 旧実装は getDoc().then() と onSnapshot を並行させていたため、
  // 「onSnapshot の初回/差分発火で parentToss を受信して select に進んだ後、
  //  遅れて走った getDoc().then() の startGame() が phase を toss に巻き戻す」
  // というレースが発生し、トスを任せた側が選択画面に移行しなかった。
  let initDoc = null;
  try {
    const snap = await getDoc(doc(db,'rooms',roomId));
    if(!snap.exists()){
      _clearActiveRoom();
      toastMsg('対象の試合は既に終了しています');
      newMatch(); render();
      return;
    }
    initDoc = snap.data();
  } catch(e){
    console.error('ルーム初期化の読み込みに失敗', e);
    _clearActiveRoom();
    toastMsg('試合の読み込みに失敗しました');
    newMatch(); render();
    return;
  }

  S.pnames[0] = initDoc.p0.userName;
  S.pnames[1] = initDoc.p1.userName;

  if(isRejoin && initDoc.gameState){
    restoreState(initDoc.gameState);
    if(initDoc.lastActionId) S.lastActionId = initDoc.lastActionId; // 既処理分を記録
    try { updateDoc(doc(db,'rooms',roomId), {disconnected: null}); } catch(e){}
    toastMsg('試合に再接続しました');
    render();
    _resetTurnWatchdog();
  } else {
    S.gameIndex=0; S.totals=[0,0]; S.gameLog=[]; S.lastMove=null;
    if(isRejoin) try { updateDoc(doc(db,'rooms',roomId), {disconnected: null}); } catch(e){}
    startGame();  // 通常はここで phase='toss'（ゲーム1）

    // 初回取得時点で既に gameState が進んでいる場合は、lastAction ではなく
    // 保存済みの確定状態を優先する。親決め直後の select 状態や、
    // その直後の最初の pick を取り逃がしてもここで追いつける。
    if(initDoc.gameState && initDoc.gameState.phase && initDoc.gameState.phase !== S.phase){
      restoreState(initDoc.gameState);
      if(initDoc.lastActionId) S.lastActionId = initDoc.lastActionId;
      render();
    } else if(initDoc.lastAction && initDoc.lastActionId && initDoc.lastActionId !== S.lastActionId){
      // 旧形式・通常アクションの取りこぼし対策。
      S.lastActionId = initDoc.lastActionId;
      _receiveAction(initDoc.lastAction);
    }
    _resetTurnWatchdog();
  }

  const roomRef = doc(db,'rooms',roomId);

  window._onBeforeUnload = ()=>{
    if(S.roomId && S.phase && !['title','matchmaking','final'].includes(S.phase)){
      try { updateDoc(roomRef, {disconnected: myRole, disconnectedAt: serverTimestamp(), ..._lastSeenPatch(myRole)}); } catch(e){}
    }
  };
  window.addEventListener('beforeunload', window._onBeforeUnload);
  _startHeartbeat(roomRef, myRole);

  _roomUnsub = onSnapshot(roomRef, snap=>{
    if(!snap.exists()){
      if(S.phase && !['title','matchmaking','final'].includes(S.phase)){
        _showRoomAbandonedNotice('試合が破棄されました');
      }
      return;
    }
    const d = snap.data();

    if(d.status === 'abandoned'){
      if(d.abandonedBy === myRole){
        _clearActiveRoom();
        return;
      }
      _showRoomAbandonedNotice('相手が試合を破棄しました');
      return;
    }
    if(d.status === 'surrendered'){
      if(d.surrenderedBy === myRole){
        _clearActiveRoom();
        return;
      }
      _stopHeartbeat();
      _clearActiveRoom();
      if(d.gameState){
        restoreState(d.gameState);
        render();
      } else {
        toastMsg('相手が投降しました');
      }
      return;
    }
    if(d.status === 'finished'){
      _clearActiveRoom();
      if(d.gameState && S.phase !== 'final'){
        restoreState(d.gameState);
        render();
      }
      return;
    }

    if(d.disconnected !== null && d.disconnected !== undefined && d.disconnected !== myRole){
      _handleDisconnect(d.disconnected, roomId);
      return;
    }
    if(_isOpponentStale(d, myRole)){
      _handleDisconnect(myRole===0?1:0, roomId, '相手の接続が一定時間確認できません');
      return;
    }

    // parentToss は lastAction ではなく gameState の phase='select' として同期する。
    // また、parentToss直後のpickまで進んだ状態を初めて受け取った場合も、
    // まず gameState に追いつかせてから二重適用を防ぐ。
    if(_applyAuthoritativeStateIfNeeded(d.gameState || null, d.lastActionId || null)){
      _resetTurnWatchdog();
      return;
    }

    if(!d.lastAction || d.lastActionId === S.lastActionId) return;
    S.lastActionId = d.lastActionId;
    _dispatchReceived(d.lastAction, d.gameState || null);
    _resetTurnWatchdog();
  });
}

let _recvQueue = [];
let _recvProcessing = false;
function _dispatchReceived(action, remoteState=null){
  _recvQueue.push({action, remoteState});
  _processRecvQueue();
}
function _applyAuthoritativeStateIfNeeded(remoteState, actionId=null){
  if(!remoteState || !remoteState.phase) return false;

  // 親決めトス後の select は、通常アクションではなく確定状態として扱う。
  // ローカルがまだ toss のままなら、lastAction の種類に関係なく gameState へ追いつく。
  if(S.phase==='toss' && remoteState.phase==='select' && remoteState.sel){
    restoreState(remoteState);
    if(actionId) S.lastActionId = actionId; // stateに含まれるactionは二重適用しない
    render();
    return true;
  }

  // result後の次ゲーム開始など、Firestore上のgameIndexが先へ進んでいる場合は確定状態へ追いつく。
  if(typeof remoteState.gameIndex === 'number' && typeof S.gameIndex === 'number' && remoteState.gameIndex > S.gameIndex){
    restoreState(remoteState);
    if(actionId) S.lastActionId = actionId;
    render();
    return true;
  }

  // ゲーム終了は通常アクションの再現より、Firestoreに保存された確定 gameState を優先する。
  // 手番側はローカルで endGame() してから gameState.phase='result' を保存するが、
  // 非手番側が最後の一手アクションを再生する途中で詰まると結果画面へ進めない。
  // そのため、remoteState が result/final ならアクション処理を待たずに復元する。
  if(['result','final'].includes(remoteState.phase)){
    const sameOrNewerGame = (remoteState.gameIndex ?? 0) >= (S.gameIndex ?? 0);
    if(sameOrNewerGame && S.phase !== remoteState.phase){
      restoreState(remoteState);
      if(actionId) S.lastActionId = actionId;
      render();
      return true;
    }
  }

  // 途中参加・再接続などで、ローカルだけが明らかに初期状態に残っている場合の保険。
  if(S.phase==='matchmaking' && ['toss','select','play','result','final'].includes(remoteState.phase)){
    restoreState(remoteState);
    if(actionId) S.lastActionId = actionId;
    render();
    return true;
  }
  return false;
}

function _recoverFromRemoteState(remoteState, reason){
  if(!remoteState) return false;
  try {
    console.warn('受信アクションの適用に失敗したため、保存済み状態から復元します', reason);
    restoreState(remoteState);
    render();
    toastMsg('同期ずれを検出したため盤面を復元しました');
    return true;
  } catch(e){
    console.error('状態復元に失敗', e);
    return false;
  }
}
function _processRecvQueue(){
  if(_recvProcessing) return;
  if(_recvQueue.length===0) return;
  _recvProcessing = true;
  const item = _recvQueue.shift();
  const action = item.action;
  const remoteState = item.remoteState;
  // pick アクションは「受信側が select フェーズに入り S.sel が用意されてから」
  // 処理する必要がある。result→select の移行が間に合っていない場合に備え、
  // 準備完了を待ってから実行する（sel=null クラッシュの防止）。
  const ready = ()=>{
    if(action.type==='pick'){
      // forGameIndex 付きの最初の pick は、result 中でも処理を許可する
      // （_receiveAction 内で nextGame して select に追いつくため）。
      if(typeof action.forGameIndex==='number'){
        return S.phase==='select' || S.phase==='result';
      }
      // 2枚目以降の pick は select 準備完了を待つ。
      return S.phase==='select' && S.sel && S.sel.step < SELECT_COUNT;
    }
    return true;
  };
  const run = ()=>{
    try {
      if(remoteState && ['result','final'].includes(remoteState.phase)){
        const sameOrNewerGame = (remoteState.gameIndex ?? 0) >= (S.gameIndex ?? 0);
        if(sameOrNewerGame && S.phase !== remoteState.phase){
          restoreState(remoteState);
          render();
          _recvProcessing = false;
          _processRecvQueue();
          return;
        }
      }
      _receiveAction(action);
    } catch(e){
      console.error('受信アクションの適用に失敗', action, e);
      _recoverFromRemoteState(remoteState, e);
    }
    let waited=0;
    const iv=setInterval(()=>{
      waited+=80;
      if(!S.busy || waited>=4000){
        clearInterval(iv);
        _recvProcessing = false;
        _processRecvQueue();
      }
    }, 80);
  };
  // busy 解除 と（pickの場合は）select準備完了 の両方を待ってから実行
  const gateOpen = ()=> !S.busy && ready();
  if(!gateOpen()){
    let w=0;
    const iv0=setInterval(()=>{
      w+=80;
      if(gateOpen() || w>=15000){ clearInterval(iv0); run(); }
    }, 80);
  } else {
    run();
  }
}

/* ---- 手番タイムアウト監視 ---- */
let _turnWatchdog = null;
const TURN_TIMEOUT_MS = 120000;

function _resetTurnWatchdog(){
  clearTimeout(_turnWatchdog);
  if(!S.roomId || S.myRole===null) return;
  if(!S.phase || ['title','matchmaking','final','result'].includes(S.phase)) return;
  const waitingForOpponent = (S.phase==='select')
    ? (S.sel && S.sel.order[S.sel.step] !== S.myRole)
    : (S.phase==='play' && S.current !== S.myRole);
  if(!waitingForOpponent) return;
  _turnWatchdog = setTimeout(()=>{
    _handleDisconnect(S.myRole^1, S.roomId, '相手の応答がありません');
  }, TURN_TIMEOUT_MS);
}
window._resetTurnWatchdog = _resetTurnWatchdog;
window._clearTurnWatchdog = function(){ clearTimeout(_turnWatchdog); _turnWatchdog = null; };

let _disconnectModalShown = false;
let _abandonedNoticeShown = false;
function _showRoomAbandonedNotice(message='試合が破棄されました'){
  if(_abandonedNoticeShown) return;
  _abandonedNoticeShown = true;
  clearTimeout(_turnWatchdog);
  _clearActiveRoom();
  if(_roomUnsub){ _roomUnsub(); _roomUnsub=null; }
  if(window._onBeforeUnload){
    window.removeEventListener('beforeunload', window._onBeforeUnload);
    window._onBeforeUnload = null;
  }
  document.querySelectorAll('.modal-bg').forEach(el=>el.remove());
  _disconnectModalShown = false;

  const bg = document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">
    <h3>試合が破棄されました</h3>
    <p class="picker-note">${message}。<br>この試合は終了しました。</p>
    <div class="close-row">
      <button class="btn" id="abandoned-ok">了承</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  document.getElementById('abandoned-ok').onclick=()=>{
    bg.remove();
    _abandonedNoticeShown = false;
    if(S){ S.roomId=null; S.myRole=null; }
    newMatch(); render();
  };
}
function _handleDisconnect(disconnectedRole, roomId, customMsg){
  if(_disconnectModalShown) return;
  if(!S.roomId) return;
  _disconnectModalShown = true;
  clearTimeout(_turnWatchdog);

  const oppName = S.pnames ? pname(disconnectedRole) : '相手';
  const msg = customMsg || `${oppName} の接続が切れました`;
  const bg = document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">
    <h3>⚠️ 接続の問題</h3>
    <p class="picker-note">${escapeHTML(msg)}。<br>再接続を待つか、試合を破棄してください。</p>
    <p class="picker-note" id="dc-timer" style="color:var(--p1);font-weight:700">60秒後に自動破棄されます</p>
    <div class="close-row">
      <button class="btn ghost sm" id="dc-wait">再接続を待つ</button>
      <button class="btn" id="dc-abandon">試合を破棄する</button>
    </div>
  </div>`;
  document.body.appendChild(bg);

  let remaining = 60;
  const timerEl = () => document.getElementById('dc-timer');
  const countdown = setInterval(()=>{
    remaining--;
    if(timerEl()) timerEl().textContent = `${remaining}秒後に自動破棄されます`;
    if(remaining <= 0){ clearInterval(countdown); _abandonMatch(roomId, bg); }
  }, 1000);

  document.getElementById('dc-wait').onclick=()=>{
    clearInterval(countdown);
    bg.remove();
    _disconnectModalShown = false;
    if(disconnectedRole === S.myRole){
      try { updateDoc(doc(db,'rooms',roomId), {disconnected: null}); } catch(e){}
    }
    toastMsg('再接続を待っています…');
    _resetTurnWatchdog();
  };

  document.getElementById('dc-abandon').onclick=()=>{
    clearInterval(countdown);
    _abandonMatch(roomId, bg);
  };
}

async function _abandonMatch(roomId, bg){
  if(bg && bg.parentNode) bg.remove();
  _disconnectModalShown = false;
  clearTimeout(_turnWatchdog);
  try {
    await updateDoc(doc(db,'rooms',roomId), {
      status: 'abandoned',
      abandonedBy: S.myRole,
      abandonedAt: serverTimestamp(),
      disconnected: null,
      gameState: serializeState(),
      ..._lastSeenPatch(S.myRole),
      updatedAt: serverTimestamp()
    });
  } catch(e){
    console.warn('試合破棄状態の保存に失敗', e);
  }
  leaveRoom();
  newMatch(); render();
  toastMsg('試合を破棄しました');
}

function leaveRoom(){
  if(_roomUnsub){ _roomUnsub(); _roomUnsub=null; }
  if(window._onBeforeUnload){
    window.removeEventListener('beforeunload', window._onBeforeUnload);
    window._onBeforeUnload = null;
  }
  clearTimeout(_turnWatchdog);
  _stopHeartbeat();
  _disconnectModalShown = false;
  _abandonedNoticeShown = false;
  _clearActiveRoom();
  S.roomId=null; S.myRole=null;
}

async function finishRoom(){
  clearTimeout(_turnWatchdog);
  _stopHeartbeat();
  if(window._onBeforeUnload){
    window.removeEventListener('beforeunload', window._onBeforeUnload);
    window._onBeforeUnload = null;
  }
  _clearActiveRoom();
  const rid = S.roomId;
  const finalState = serializeState();
  if(_roomUnsub){ _roomUnsub(); _roomUnsub=null; }
  if(rid){
    try {
      await updateDoc(doc(db,'rooms',rid), {
        status: 'finished',
        finishedAt: serverTimestamp(),
        gameState: finalState,
        disconnected: null,
        ..._lastSeenPatch(S.myRole)
      });
    } catch(e){ console.warn('ルーム終了状態の保存に失敗', e); }
  }
  S.roomId=null;
}

/* ---- 状態のシリアライズ/復元 ---- */
function _firestoreClean(value, inArray=false){
  // Firestore は undefined を保存できず、配列の要素として配列を直接入れることもできない。
  // 保存直前の gameState を必ず Firestore 互換の値だけに正規化する。
  if(value === undefined) return null;
  if(value === null) return null;
  if(typeof value === 'number') return Number.isFinite(value) ? value : null;
  if(typeof value !== 'object') return value;
  if(value instanceof Set) return _firestoreClean(Array.from(value), inArray);
  if(Array.isArray(value)){
    const arr = value.map(v=>_firestoreClean(v, true));
    if(inArray){
      const obj={};
      arr.forEach((v,i)=>{ obj['i'+i]=v; });
      return obj;
    }
    return arr;
  }
  const out={};
  Object.keys(value).forEach(k=>{
    out[k]=_firestoreClean(value[k], false);
  });
  return out;
}
function _serializeCoin(c){
  if(!c) return null;
  return {
    owner: c.owner ?? null,
    face: c.face ?? null,
    shared: !!c.shared,
    locked: !!c.locked,
    type: c.type ?? null,
    tempLockFor: c.tempLockFor ?? null,
    tempLockTurns: c.tempLockTurns ?? null
  };
}
function _restoreCoin(c){
  if(!c) return null;
  const out={
    owner: c.owner ?? null,
    face: c.face ?? FRONT
  };
  if(c.shared) out.shared=true;
  if(c.locked) out.locked=true;
  if(c.type) out.type=c.type;
  if(c.tempLockFor !== undefined && c.tempLockFor !== null) out.tempLockFor=c.tempLockFor;
  if(c.tempLockTurns !== undefined && c.tempLockTurns !== null) out.tempLockTurns=c.tempLockTurns;
  return out;
}
function _serializeBoard(board){
  const src = Array.isArray(board) ? board : [];
  const out=[];
  for(let i=0;i<16;i++) out[i]=_serializeCoin(src[i]);
  return out;
}
function _restoreBoard(board){
  const src = Array.isArray(board) ? board : [];
  const out=[];
  for(let i=0;i<16;i++) out[i]=_restoreCoin(src[i]);
  return out;
}
function _pairArray(value, fallback=[null,null]){
  if(Array.isArray(value)){
    return [
      value.length>0 ? value[0] : fallback[0],
      value.length>1 ? value[1] : fallback[1]
    ];
  }
  if(value && typeof value === 'object'){
    return [
      Object.prototype.hasOwnProperty.call(value,'p0') ? value.p0 : fallback[0],
      Object.prototype.hasOwnProperty.call(value,'p1') ? value.p1 : fallback[1]
    ];
  }
  return fallback.slice();
}
function _pairObject(value, fallback=[null,null]){
  const a = _pairArray(value, fallback);
  return {
    p0: a[0] === undefined ? null : a[0],
    p1: a[1] === undefined ? null : a[1]
  };
}
function _safeArray(value, fallback=[]){
  return Array.isArray(value) ? value : fallback.slice();
}
function _serializeRuns(runs){
  const out = {};
  (runs || []).forEach((r, i)=>{
    if(!r) return;
    out['r'+i] = {
      player: r.player ?? null,
      len: r.len ?? null,
      cells: _safeArray(r.cells)
    };
  });
  return out;
}
function _restoreRuns(runs){
  if(Array.isArray(runs)) return runs;
  if(!runs || typeof runs !== 'object') return [];
  return Object.keys(runs)
    .sort((a,b)=>parseInt(a.slice(1),10)-parseInt(b.slice(1),10))
    .map(k=>({
      player: runs[k].player,
      len: runs[k].len,
      cells: _safeArray(runs[k].cells)
    }));
}
function _serializeGameRecord(rec){
  if(!rec) return null;
  return {
    parent: rec.parent ?? null,
    board: _pairObject(rec.board, [0,0]),
    cards: _pairObject(rec.cards, [0,0]),
    score: _pairObject(rec.score, [0,0]),
    snapshot: _serializeBoard(rec.snapshot),
    runs: _serializeRuns(rec.runs),
    sets: _pairObject(rec.sets, [0,0])
  };
}
function _restoreGameRecord(rec){
  if(!rec) return null;
  return {
    parent: rec.parent ?? null,
    board: _pairArray(rec.board, [0,0]),
    cards: _pairArray(rec.cards, [0,0]),
    score: _pairArray(rec.score, [0,0]),
    snapshot: _serializeBoard(rec.snapshot),
    runs: _restoreRuns(rec.runs),
    sets: _pairArray(rec.sets, [0,0])
  };
}
function _serializeGameLog(log){
  const out = {};
  (log || []).forEach((rec, i)=>{
    if(rec) out['g'+i] = _serializeGameRecord(rec);
  });
  return out;
}
function _restoreGameLog(log){
  if(Array.isArray(log)) return log.map(_restoreGameRecord).filter(Boolean);
  if(!log || typeof log !== 'object') return [];
  const arr = [];
  Object.keys(log).forEach(k=>{
    const n = parseInt(k.slice(1),10);
    if(Number.isFinite(n)) arr[n] = _restoreGameRecord(log[k]);
  });
  return arr.filter(Boolean);
}
function serializeState(){
  // Firestore は「配列の中に配列」を保存できず、undefined も保存できない。
  // hands: [[], []] のような値は {p0: [], p1: []} に変換し、最後に全体を正規化する。
  return _firestoreClean({
    phase: S.phase,
    gameIndex: S.gameIndex,
    totals: _pairObject(S.totals, [0,0]),
    gameLog: _serializeGameLog(S.gameLog),
    parent: S.parent,
    current: S.current,
    board: _serializeBoard(S.board),
    coins: _pairObject(S.coins, [8,8]),
    hands: {
      p0: _safeArray(S.hands && S.hands[0]),
      p1: _safeArray(S.hands && S.hands[1])
    },
    designate: _pairObject(S.designate, [null,null]),
    cardLocks: _safeArray(S.cardLocks),
    flipCooldown: _pairObject(S.flipCooldown, [0,0]),
    sel: S.sel ? { available: Array.from(S.sel.available), order: _safeArray(S.sel.order), step: S.sel.step } : null,
    over: !!S.over,
    lastBreakdown: _serializeGameRecord(S.lastBreakdown),
    pnames: _pairObject(S.pnames, [null,null]),
    finalReason: S._finalReason || null
  });
}
function restoreState(st){
  S.phase = st.phase;
  S.gameIndex = st.gameIndex ?? 0;
  S.totals = _pairArray(st.totals, [0,0]);
  S.gameLog = _restoreGameLog(st.gameLog);
  S.parent = st.parent ?? null;
  S.current = st.current ?? null;
  S.board = _restoreBoard(st.board);
  S.coins = _pairArray(st.coins, [8,8]);
  S.hands = _pairArray(st.hands, [[],[]]).map(v=>_safeArray(v));
  S.designate = _pairArray(st.designate, [null,null]);
  S.cardLocks = _safeArray(st.cardLocks);
  S.flipCooldown = _pairArray(st.flipCooldown, [0,0]);
  S.sel = st.sel ? { available: new Set(_safeArray(st.sel.available)), order: _safeArray(st.sel.order), step: st.sel.step ?? 0 } : null;
  S.over = !!st.over;
  S.lastBreakdown = _restoreGameRecord(st.lastBreakdown);
  if(st.pnames) S.pnames = _pairArray(st.pnames, [null,null]);
  S._finalReason = st.finalReason || null;
  S.pending = null;
  S.busy = false;
}

/* ---- 親決め結果の確定保存 ---- */
async function commitParentToss(parent){
  if(!S.roomId) throw new Error('roomId がありません');
  const roomId = S.roomId;
  const prevState = serializeState();

  // Firestoreへ保存するため、まずローカルにselect状態を作る。
  // 書き込み失敗時は元のtoss状態へ戻す。
  enterSelect(parent, false);
  const nextState = serializeState();

  try {
    await updateDoc(doc(db,'rooms', roomId), {
      gameState: nextState,
      gameIndex: S.gameIndex,
      totals: _pairObject(S.totals, [0,0]),
      ..._lastSeenPatch(S.myRole),
      updatedAt: serverTimestamp()
    });
    render();
    setTimeout(()=>_resetTurnWatchdog(), 100);
  } catch(e){
    restoreState(prevState);
    throw e;
  }
}

/* ---- アクション送信 ---- */
async function sendAction(action){
  if(!S.roomId) return;
  const actionId = crypto.randomUUID();
  const roomId = S.roomId;
  S.lastActionId = actionId;
  try {
    // カード選択など、呼び出し直後にローカル状態が進む処理のため、1tick待ってから保存する。
    await new Promise(r=>setTimeout(r, 0));
    await updateDoc(doc(db,'rooms', roomId), {
      lastAction: {...action, senderRole:S.myRole, sentAtMs:Date.now()},
      lastActionId: actionId,
      gameState: serializeState(),
      gameIndex: S.gameIndex,
      ..._lastSeenPatch(S.myRole),
      updatedAt: serverTimestamp()
    });
    setTimeout(()=>_resetTurnWatchdog(), 100);
  } catch(e){
    toastMsg('通信エラーが発生しました');
    console.error(e);
  }
}

async function sendActionNow(action, reason='action'){
  if(!S.roomId) return;
  const actionId = crypto.randomUUID();
  const roomId = S.roomId;
  S.lastActionId = actionId;
  try {
    const state = serializeState();
    await updateDoc(doc(db,'rooms', roomId), {
      lastAction: {...action, senderRole:S.myRole, sentAtMs:Date.now(), syncReason:reason},
      lastActionId: actionId,
      gameState: state,
      gameIndex: S.gameIndex,
      forcedPhase: state.phase,
      ..._lastSeenPatch(S.myRole),
      updatedAt: serverTimestamp()
    });
    setTimeout(()=>_resetTurnWatchdog(), 100);
  } catch(e){
    toastMsg('通信エラーが発生しました');
    console.error(e);
  }
}

function finishLocalAction(action, actionEndsGame=false, reason='action'){
  const ended = afterAction(!!actionEndsGame);
  if(action) sendActionNow({...action, endsGame: ended, finalPhase: S.phase}, reason);
  return ended;
}

async function syncState(reason='state'){
  if(!S.roomId) return;
  try {
    await updateDoc(doc(db,'rooms', S.roomId), {
      gameState: serializeState(),
      gameIndex: S.gameIndex,
      ..._lastSeenPatch(S.myRole),
      updatedAt: serverTimestamp(),
      syncReason: reason
    });
  } catch(e){ console.warn('状態同期に失敗', reason, e); }
}

async function advanceAfterResult(){
  nextGame();
  if(S.roomId && S.phase !== 'final'){
    await syncState('nextGame');
  }
}

/* ---- アクション受信・実行 ---- */
function _receiveAction(action){
  const opp = S.myRole ^ 1;
  switch(action.type){

    case 'parentToss':
      // 親トス結果の反映。onSnapshot 経由でも、購読初期化経由でも呼ばれうる。
      // 既に select 以降に進んでいれば二重実行しない（冪等化）。
      if(S.phase==='toss' || S.phase===undefined || S.phase===null){
        S.parent = action.parent;
        toastMsg(`${pname(S.parent)} が親になりました`);
        beginSelect();
      }
      break;

    case 'place':
      if(action.tossed){
        doToss(face=>{
          placeCoin(opp, action.cell, action.face);
          if(S.coins[opp]===0) S._justPlacedEighth=true;
          setLastMove(`${pname(opp)}：${faceLabel(action.face)}を配置`);
          S.pending=null;
          afterAction();
        }, action.face);
      } else {
        placeCoin(opp, action.cell, action.face);
        if(S.coins[opp]===0) S._justPlacedEighth=true;
        setLastMove(`${pname(opp)}：${faceLabel(action.face)}を配置`);
        S.pending=null;
        afterAction();
      }
      break;

    case 'flip':
      { const c=S.board[action.cell];
        if(c){ c.face=c.face===FRONT?BACK:FRONT; }
        if(!S.flipCooldown) S.flipCooldown=[0,0];
        S.flipCooldown[opp]=2;
        sfx('flip'); shakeScreen(); setLastMove(`${pname(opp)}：コインを裏返した`);
        S.pending=null; afterAction(); }
      break;

    case 'card':
      _receiveCard(action, opp);
      break;

    case 'pick':
      // forGameIndex があり、自分がまだ前のゲームに留まっている場合は
      // 先に nextGame() で追いついてから pick を処理する。
      // （result カウントダウンのタイマー誤差による先行/遅延を吸収）
      if(typeof action.forGameIndex==='number'){
        // result 表示中のタイマーを止めてから追いつく
        let guard=0;
        while(S.gameIndex < action.forGameIndex && guard++ < 5){
          clearInterval(S._resultTimer);
          if(S.phase==='result'){ nextGame(); }
          else break;
        }
      }
      commitPick(action.card);
      break;

    case 'surrender':
      clearTimeout(_turnWatchdog);
      toastMsg(`${pname(opp)} が投降しました`);
      setTimeout(()=>{
        buildSurrenderFinal(opp, true);
      }, 400);
      break;
  }
}

function _receiveCard(action, opp){
  const {card} = action;
  showCardUse(opp, card); shakeScreen();
  switch(card){
    case 'kakumei':
      consumeCard(opp,'kakumei');
      S.board.forEach(c=>{if(c&&!c.locked&&c.type!=='puppet')c.face=FRONT;});
      sfx('card'); setLastMove(`${pname(opp)}：革命`); toastMsg('革命：すべて表になった');
      afterAction(); break;
    case 'chudan':
      S.hands[opp]=[];
      sfx('card'); setLastMove(`${pname(opp)}：中断`); toastMsg('中断：ゲームを終了します');
      afterAction(true); break;
    case 'shitei':
      consumeCard(opp,'shitei');
      S.designate[0]=action.face; S.designate[1]=action.face;
      sfx('card'); setLastMove(`${pname(opp)}：指定（${faceLabel(action.face)}）`);
      toastMsg(`指定：次の相手と自分のトス結果を${faceLabel(action.face)}に固定`);
      afterAction(); break;
    case 'nurikeshi':
      consumeCard(opp,'nurikeshi'); S.board[action.cell].shared=true;
      sfx('card'); setLastMove(`${pname(opp)}：色抜き`); toastMsg('色抜き：コインが両者のものになった');
      afterAction(); break;
    case 'ido':
      consumeCard(opp,'ido'); S.board[action.to]=S.board[action.from]; S.board[action.from]=null;
      sfx('card'); setLastMove(`${pname(opp)}：移動`); toastMsg('相手が移動を使用した');
      afterAction(); break;
    case 'kagikake':
      consumeCard(opp,'kagikake'); S.board[action.cell].locked=true;
      sfx('card'); setLastMove(`${pname(opp)}：鍵掛け`); toastMsg('鍵掛け：コインがロックされた');
      afterAction(); break;
    case 'uragaeshi':
      consumeCard(opp,'uragaeshi');
      { const c=S.board[action.cell]; if(c){ c.face=c.face===FRONT?BACK:FRONT; c.locked=true; c.tempLockFor=opp; c.tempLockTurns=1; } }
      sfx('flip'); setLastMove(`${pname(opp)}：裏返し`); toastMsg('裏返し：コインを裏返してロックされた');
      afterAction(); break;
    case 'teitai':
      consumeCard(opp,'teitai');
      S.cardLocks.push({owner:opp^1, card:action.lock, releaseFor:opp, turns:2});
      sfx('card'); setLastMove(`${pname(opp)}：停滞（${CARD_INFO[action.lock].name}）`);
      toastMsg(`停滞：「${CARD_INFO[action.lock].name}」が止められた`);
      afterAction(); break;
    case 'fukusei':
      consumeCard(opp,'fukusei'); if(action.dup) S.hands[opp].push(action.dup);
      sfx('card'); setLastMove(`${pname(opp)}：複製`); toastMsg('複製：カードが増えた');
      afterAction(); break;
  }
}

/* ---- 投降 ---- */
async function surrender(){
  if(!S.roomId || S.myRole===null) return;
  const rid = S.roomId;
  const loserRole = S.myRole;
  const prevState = serializeState();
  buildSurrenderFinal(loserRole, false);
  const finalState = serializeState();
  restoreState(prevState);

  try {
    await updateDoc(doc(db,'rooms', rid), {
      status: 'surrendered',
      surrenderedBy: loserRole,
      surrenderedAt: serverTimestamp(),
      gameState: finalState,
      disconnected: null,
      ..._lastSeenPatch(loserRole),
      updatedAt: serverTimestamp()
    });
  } catch(e){
    console.error('投降状態の保存に失敗', e);
    toastMsg('投降の送信に失敗しました');
    return;
  }

  const user = loadLocalUser();
  if(user){
    try {
      const uref = doc(db,'users', user.docId);
      const usnap = await getDoc(uref);
      if(usnap.exists()){
        const d = usnap.data();
        const history = [{result:'lose', opponentName:S.pnames[S.myRole^1] || '相手', date:new Date().toLocaleDateString('ja-JP')}, ...(d.history||[])].slice(0,10);
        await updateDoc(uref, {losses:(d.losses||0)+1, streak:0, history});
        saveLocalUser({...user, losses:(user.losses||0)+1, streak:0, history});
      }
    } catch(e){ console.warn('投降敗北の戦績保存に失敗', e); }
  }

  clearTimeout(_turnWatchdog);
  _stopHeartbeat();
  if(window._onBeforeUnload){ window.removeEventListener('beforeunload', window._onBeforeUnload); window._onBeforeUnload=null; }
  if(_roomUnsub){ _roomUnsub(); _roomUnsub=null; }
  _clearActiveRoom();
  S.roomId=null; S.myRole=null;
  newMatch(); render();
}

/* ---- 戦績保存 ---- */
async function saveMatchResult(winnerRole){
  const user = loadLocalUser();
  if(!user || S.myRole===null) return;
  const myWin = winnerRole===S.myRole;
  const isDraw = winnerRole===null;
  const result = isDraw?'draw':myWin?'win':'lose';
  const oppName = S.pnames[S.myRole^1] || '相手';
  const uref = doc(db,'users', user.docId);
  try {
    const usnap = await getDoc(uref);
    if(!usnap.exists()) return;
    const d = usnap.data();
    const history = [{result, opponentName:oppName, date:new Date().toLocaleDateString('ja-JP')}, ...(d.history||[])].slice(0,10);
    const wins = (d.wins||0) + (myWin?1:0);
    const losses = (d.losses||0) + (!myWin&&!isDraw?1:0);
    const draws = (d.draws||0) + (isDraw?1:0);
    const streak = myWin ? (d.streak||0)+1 : 0;
    await updateDoc(uref, {wins, losses, draws, streak, history});
    saveLocalUser({...user, wins, losses, draws, streak, history});
  } catch(e){ console.error('戦績保存エラー', e); }
}

/* ---- 戦績モーダル ---- */
function showRecordModal(){
  const user = loadLocalUser();
  if(!user){ toastMsg('ユーザー情報がありません'); return; }
  const total = (user.wins||0)+(user.losses||0)+(user.draws||0);
  const rate = total>0 ? Math.round((user.wins||0)/total*100) : 0;
  const histRows = (user.history||[]).map(h=>{
    const icon = h.result==='win'?'🏆':h.result==='lose'?'💀':'🤝';
    return `<div class="sb-row"><div>${icon} ${h.result==='win'?'勝利':h.result==='lose'?'敗北':'引き分け'}</div><div>${escapeHTML(h.opponentName)}</div><div>${escapeHTML(h.date)}</div></div>`;
  }).join('') || '<div class="picker-note">対戦履歴がありません</div>';
  const bg=document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">
    <h3>戦績</h3>
    <div class="user-badge" style="margin-bottom:16px">
      <span class="user-name">${escapeHTML(user.name)}</span><span class="user-id">#${escapeHTML(user.id)}</span>
    </div>
    <div class="scoreboard">
      <div class="sb-row head"><div>勝</div><div>負</div><div>分</div><div>勝率</div><div>連勝</div></div>
      <div class="sb-row"><div>${user.wins||0}</div><div>${user.losses||0}</div><div>${user.draws||0}</div><div>${rate}%</div><div>${user.streak||0}</div></div>
    </div>
    <h4 style="margin-top:16px">直近の対戦</h4>
    <div class="scoreboard">${histRows}</div>
    <div class="close-row"><button class="btn" id="rec-close">閉じる</button></div>

async function _cleanupStaleEntries(){
  const user = loadLocalUser();
  if(!user) return;
  try {
    const qref = doc(db,'matchQueue','waiting');
    const qsnap = await getDoc(qref);
    if(qsnap.exists() && qsnap.data().userId === user.docId){
      await deleteDoc(qref);
    }
    const pref = doc(db,'matchQueue','pending_'+user.docId);
    const psnap = await getDoc(pref);
    if(psnap.exists()){
      const {roomId} = psnap.data();
      const rsnap = roomId ? await getDoc(doc(db,'rooms', roomId)) : null;
      if(!rsnap || !rsnap.exists() || ['abandoned','finished','surrendered'].includes(rsnap.data().status)){
        await deleteDoc(pref);
      }
    }
  } catch(e){ console.warn('クリーンアップ失敗（無視）', e); }
}

async function _checkRejoin(){
  const active = _loadActiveRoom();
  if(!active || !active.roomId) return;
  try {
    const rsnap = await getDoc(doc(db,'rooms', active.roomId));
    if(!rsnap.exists()){
      _clearActiveRoom();
      return;
    }
    if(rsnap.data().status === 'abandoned'){
      _showRoomAbandonedNotice('相手が試合を破棄しました');
      return;
    }
    if(rsnap.data().status === 'surrendered'){
      if(rsnap.data().gameState && rsnap.data().surrenderedBy !== active.myRole){
        _subscribeRoom(active.roomId, active.myRole, true);
      } else {
        _clearActiveRoom();
      }
      return;
    }
    if(rsnap.data().status === 'finished'){
      _clearActiveRoom();
      return;
    }
    const d = rsnap.data();
    const oppName = active.myRole===0 ? (d.p1?.userName||'相手') : (d.p0?.userName||'相手');
    const bg=document.createElement('div'); bg.className='modal-bg';
    bg.innerHTML=`<div class="modal">
      <h3>中断した試合があります</h3>
      <p class="picker-note">${escapeHTML(oppName)} との試合が進行中です。<br>再接続しますか？</p>
      <div class="close-row">
        <button class="btn ghost sm" id="rj-quit">破棄する</button>
        <button class="btn" id="rj-go">再接続する</button>
      </div>
    </div>`;
    document.body.appendChild(bg);
    document.getElementById('rj-go').onclick=()=>{
      bg.remove();
      _subscribeRoom(active.roomId, active.myRole, true);
    };
    document.getElementById('rj-quit').onclick=async()=>{
      bg.remove();
      try {
        await updateDoc(doc(db,'rooms', active.roomId), {
          status: 'abandoned',
          abandonedBy: active.myRole,
          abandonedAt: serverTimestamp(),
          disconnected: null,
          ..._lastSeenPatch(active.myRole),
          updatedAt: serverTimestamp()
        });
      } catch(e){ console.warn('試合破棄状態の保存に失敗', e); }
      _clearActiveRoom();
      toastMsg('試合を破棄しました');
    };
  } catch(e){ _clearActiveRoom(); }
}

if(window._boot) window._boot();
else { newMatch(); render(); }
_cleanupStaleEntries();
_checkRejoin();

</script>
