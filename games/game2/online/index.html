<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表裏陣取り</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F4F1;
    --surface:#FFFFFF;
    --ink:#1C1C1A;
    --muted:#8C8B83;
    --faint:#B6B5AD;
    --line:#E6E5DF;
    --line-strong:#D7D6CE;
    --p0:#2E4B8F;      /* あなた = 藍 */
    --p0-soft:#E7ECF6;
    --p0-glow:rgba(46,75,143,.32);
    --p0-faint:rgba(46,75,143,.14);
    --p1:#B14A33;      /* 相手 = 朱 */
    --p1-soft:#F7E9E4;
    --p1-glow:rgba(177,74,51,.32);
    --p1-faint:rgba(177,74,51,.14);
    --accent:#1C1C1A;
    --ok:#2E7D5B;
    --shadow:0 1px 2px rgba(28,28,26,.05),0 8px 24px rgba(28,28,26,.06);
    --r:14px;
    --serif:"Noto Serif JP","Hiragino Mincho ProN",serif;
    --sans:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic Medium",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.6;
    display:flex;justify-content:center;
  }
  #app{width:100%;max-width:880px;min-height:100vh;padding:24px 18px 60px;display:flex;flex-direction:column}

  /* ---------- 共通 ---------- */
  .eyebrow{font-size:11px;letter-spacing:.28em;color:var(--muted);text-transform:none;font-weight:500}
  .btn{
    font-family:var(--sans);font-size:14px;font-weight:500;color:#fff;background:var(--accent);
    border:none;border-radius:10px;padding:12px 22px;cursor:pointer;transition:transform .12s ease,opacity .12s ease,background .12s;
  }
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:focus-visible{outline:2px solid var(--p0);outline-offset:2px}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong)}
  .btn.ghost:hover{background:#fff}
  .btn:disabled{opacity:.32;cursor:not-allowed;transform:none}
  .btn.sm{padding:9px 16px;font-size:13px}
  .mode-seg{display:inline-flex;background:#fff;border:1px solid var(--line-strong);border-radius:12px;padding:4px;gap:4px;margin:10px 0 24px}
  .seg{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--muted);background:transparent;border:none;border-radius:9px;padding:9px 18px;cursor:pointer;transition:background .14s,color .14s}
  .seg.active{background:var(--ink);color:#fff}
  .seg:focus-visible{outline:2px solid var(--p0);outline-offset:2px}

  /* ---------- タイトル ---------- */
  .version-badge{position:fixed;left:14px;top:10px;z-index:20;font-size:11px;letter-spacing:.08em;color:var(--muted);background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:999px;padding:3px 9px;backdrop-filter:blur(2px)}
  .title-wrap{margin:auto 0;text-align:center;padding:30px 0}
  .title-mark{
    width:104px;height:104px;margin:0 auto 26px;position:relative;
  }
  .title-coin{
    position:absolute;width:74px;height:74px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:30px;
    box-shadow:var(--shadow);
  }
  .title-coin.front{background:var(--p0);color:#fff;left:0;top:0;z-index:2}
  .title-coin.back{background:#fff;color:var(--p1);border:2px solid var(--p1);right:0;bottom:0}
  h1.title{font-family:var(--serif);font-weight:700;font-size:40px;letter-spacing:.06em;margin-bottom:10px}
  .subtitle{color:var(--muted);font-size:14px;margin-bottom:32px}
  .title-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  /* ---------- ヘッダ（対局中スコア） ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .game-counter{font-size:12px;color:var(--muted);letter-spacing:.18em}
  .totals{display:flex;align-items:center;gap:14px;font-family:var(--serif);font-size:15px}
  .tot{display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%}
  .dot.p0{background:var(--p0)} .dot.p1{background:var(--p1)}
  .link{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:var(--sans)}
  .link:hover{color:var(--ink)}

  /* ---------- 盤面 ---------- */
  .board-stage{display:flex;flex-direction:column;align-items:center;gap:16px}
  .board{
    display:grid;grid-template-columns:repeat(4,minmax(0,1fr));grid-template-rows:repeat(4,minmax(0,1fr));gap:10px;
    background:var(--surface);padding:14px;border-radius:18px;border:1px solid var(--line);
    box-shadow:var(--shadow);width:min(100%,420px);aspect-ratio:1;
  }
  .cell{
    background:#FBFBF9;border:1px solid var(--line);border-radius:12px;
    display:flex;align-items:center;justify-content:center;position:relative;cursor:default;
    min-width:0;min-height:0;aspect-ratio:1;transition:background .12s,border-color .12s;
  }
  .cell.selectable-p0{cursor:pointer;border-color:var(--p0);background:var(--p0-soft);box-shadow:inset 0 0 0 1px var(--p0)}
  .cell.selectable-p0:hover{background:#dde6f5}
  .cell.selectable-p1{cursor:pointer;border-color:var(--p1);background:var(--p1-soft);box-shadow:inset 0 0 0 1px var(--p1)}
  .cell.selectable-p1:hover{background:#f3ddd8}
  .cell.target{cursor:pointer;border-color:var(--p1);background:var(--p1-soft);box-shadow:inset 0 0 0 1px var(--p1)}
  .cell.target:hover{background:#f1ddd5}
  .cell.win{animation:pulse 1.1s ease infinite}
  .cell.setdone{box-shadow:inset 0 0 0 2px rgba(46,125,91,.5)}
  @keyframes pulse{0%,100%{box-shadow:inset 0 0 0 2px var(--ok)}50%{box-shadow:inset 0 0 0 2px rgba(46,125,91,.35)}}

  .coin{
    width:78%;height:78%;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:clamp(16px,5vw,24px);font-weight:500;user-select:none;
    transition:transform .15s ease;position:relative;
  }
  .coin.p0.front{background:var(--p0);color:#fff}
  .coin.p0.back{background:#fff;color:var(--p0);border:2px solid var(--p0)}
  .coin.p1.front{background:var(--p1);color:#fff}
  .coin.p1.back{background:#fff;color:var(--p1);border:2px solid var(--p1)}
  .coin.shared.front{background:#7A4F9E;color:#fff}
  .coin.shared.back{background:#fff;color:#7A4F9E;border:2px solid #7A4F9E}
  .coin.puppet{background:#EDEBE4;color:#8C8B83;border:2px dashed #B6B5AD}
  .coin.locked{box-shadow:0 0 0 2px #C9A227, 0 0 0 4px rgba(201,162,39,.25)}
  .coin.locked::after{content:'🔒';position:absolute;font-size:10px;transform:translate(140%,-140%)}
  .coin.flip{animation:flip .5s ease}
  @keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg) scale(.9)}100%{transform:rotateY(0)}}

  /* ---------- プレイヤーパネル ---------- */
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(100%,420px)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
  .panel.active{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .pname{font-weight:700;font-size:14px;display:flex;align-items:center;gap:7px}
  .badge{font-size:10px;letter-spacing:.1em;padding:2px 7px;border-radius:20px;border:1px solid var(--line-strong);color:var(--muted)}
  .badge.oya{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pmeta{font-size:11.5px;color:var(--muted)}
  .result-countdown{font-size:14px;color:var(--p0);font-weight:700;margin:16px 0 8px;letter-spacing:.04em}
  .hand{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .card-chip{
    font-size:12px;padding:5px 9px;border-radius:8px;border:1px solid var(--line-strong);background:#FBFBF9;color:var(--ink);
    cursor:default;transition:all .12s;font-family:var(--sans)
  }
  .card-chip.usable{cursor:pointer;border-color:var(--p0);color:var(--p0);background:var(--p0-soft);font-weight:500}
  .card-chip.usable:hover{background:#dde6f5}
  .card-chip.dead{opacity:.4}
  .card-chip.locked-card{opacity:.55;background:#F3EFD8;border-color:#C9A227;color:#8a7320;cursor:not-allowed}
  .desig{font-size:11px;color:var(--p0);margin-top:7px;font-weight:500}

  /* ---------- アクションバー ---------- */
  .actionbar{width:min(100%,420px);background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
  .turn-tag{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.08em}
  .turn-tag b{color:var(--ink)}
  .instruction{font-size:13.5px;color:var(--ink);margin-bottom:12px;min-height:20px}
  .instruction .hl{color:var(--p0);font-weight:600}
  .instruction .hl.p1{color:var(--p1)}
  .instruction .hl.p0{color:var(--p0)}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
  .acts .btn{flex:1;min-width:120px}
  .thinking{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;padding:6px 0}
  .thinking .pip{width:6px;height:6px;border-radius:50%;background:var(--p1);animation:blink 1s infinite}
  @keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

  /* ---------- カード選択 ---------- */
  .select-wrap{display:flex;flex-direction:column;gap:16px}
  .select-head{text-align:center}
  .select-head h2{font-family:var(--serif);font-size:24px;font-weight:700;margin:4px 0}
  .select-status{font-size:13px;color:var(--muted)}
  .select-status b{color:var(--ink)}
  .pick-order{display:flex;gap:6px;justify-content:center;margin-top:8px}
  .po{width:24px;height:6px;border-radius:3px;background:var(--line-strong)}
  .po.p0{background:var(--p0)} .po.p1{background:var(--p1)} .po.now{outline:2px solid var(--ink);outline-offset:2px}
  .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:560px){.card-grid{grid-template-columns:repeat(2,1fr)}}
  .gcard{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;text-align:left;
    transition:all .14s;position:relative;overflow:hidden
  }
  .gcard .gname{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:6px}
  .gcard .gdesc{font-size:11.5px;color:var(--muted);line-height:1.5}
  .gcard.pick{cursor:pointer}
  .gcard.pick:hover{border-color:var(--p0);transform:translateY(-2px);box-shadow:var(--shadow)}
  .gcard.taken{opacity:.5}
  .gcard .owner-flag{position:absolute;top:0;right:0;font-size:10px;letter-spacing:.08em;color:#fff;padding:3px 9px;border-bottom-left-radius:10px}
  .gcard .owner-flag.p0{background:var(--p0)} .gcard .owner-flag.p1{background:var(--p1)}

  /* ---------- 結果 ---------- */
  .result-wrap{display:flex;flex-direction:column;gap:18px;align-items:center;text-align:center}
  .result-wrap h2{font-family:var(--serif);font-size:26px;font-weight:700}
  .scoreboard{width:min(100%,460px);background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
  .sb-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;align-items:center;padding:13px 18px;border-bottom:1px solid var(--line);font-size:14px}
  .sb-row:last-child{border-bottom:none}
  .sb-row.head{font-size:11px;letter-spacing:.14em;color:var(--muted);background:#FBFBF9}
  .sb-row.total{font-family:var(--serif);font-weight:700;font-size:16px;background:#FBFBF9}
  .sb-row.subtotal{font-weight:600;font-size:14px;color:var(--ink);background:#fcfcfb;border-top:1px dashed var(--line)}
  .sb-row .num{text-align:center;font-variant-numeric:tabular-nums}
  .sb-name{display:flex;align-items:center;gap:8px}
  .breakdown{font-size:12px;color:var(--muted)}

  /* ---------- ルール ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(28,28,26,.42);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal{background:#fff;border-radius:18px;max-width:560px;width:100%;max-height:84vh;overflow:auto;padding:26px 26px 30px;box-shadow:var(--shadow)}
  .modal h3{font-family:var(--serif);font-size:22px;margin-bottom:14px}
  .modal h4{font-size:13px;margin:16px 0 4px;color:var(--p0);letter-spacing:.04em}
  .modal p,.modal li{font-size:13px;color:#3a3a36;line-height:1.7}
  .modal ul{padding-left:18px}
  .modal .close-row{display:flex;justify-content:flex-end;margin-top:20px}

  /* ---------- 指定/汎用 choice ---------- */
  .choice-row{display:flex;gap:8px;align-items:center;margin-top:8px}
  .toss-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:40;background:rgba(244,244,241,.7);backdrop-filter:blur(2px)}
  .toss-card{background:#fff;padding:30px 40px;border-radius:18px;box-shadow:var(--shadow);text-align:center}
  .toss-coin{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:34px}
  .toss-coin.spin{animation:spin .7s ease}
  @keyframes spin{0%{transform:rotateY(0)}100%{transform:rotateY(720deg)}}
  .toss-label{font-size:14px;color:var(--muted)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;z-index:60;box-shadow:var(--shadow);animation:rise .3s ease}
  @keyframes rise{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
  }

  /* ---- 追加UI ---- */
  .iconbtn{background:none;border:1px solid var(--line-strong);border-radius:8px;width:30px;height:30px;font-size:15px;line-height:1;cursor:pointer;color:var(--muted);transition:background .12s,color .12s}
  .iconbtn:hover{background:#fff;color:var(--ink)}
  .iconbtn:focus-visible{outline:2px solid var(--p0);outline-offset:2px}

  /* ターンバナー */
  .turn-banner{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;padding:9px 18px;border-radius:30px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);animation:tbpop .26s ease}
  .turn-banner .tb-dot{width:11px;height:11px;border-radius:50%}
  .turn-banner.p0{color:var(--p0)} .turn-banner.p0 .tb-dot{background:var(--p0);box-shadow:0 0 0 4px var(--p0-soft)}
  .turn-banner.p1{color:var(--p1)} .turn-banner.p1 .tb-dot{background:var(--p1);box-shadow:0 0 0 4px var(--p1-soft)}
  @keyframes tbpop{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
  .board{position:relative;transition:box-shadow .3s ease}
  .board.turn-p0{box-shadow:var(--shadow),0 0 0 2px var(--p0),0 0 10px 3px var(--p0-soft),0 0 26px 10px var(--p0-glow),0 0 48px 22px var(--p0-faint)}
  .board.turn-p1{box-shadow:var(--shadow),0 0 0 2px var(--p1),0 0 10px 3px var(--p1-soft),0 0 26px 10px var(--p1-glow),0 0 48px 22px var(--p1-faint)}

  /* アクティブパネルを手番色で強調 */
  .panel.active.a0{border-color:var(--p0);box-shadow:0 0 0 1px var(--p0)}
  .panel.active.a1{border-color:var(--p1);box-shadow:0 0 0 1px var(--p1)}

  /* 3組進捗ピップ */
  .setrow{display:flex;align-items:center;gap:6px;margin-top:6px}
  .setlabel{font-size:10.5px;color:var(--faint)}
  .setpip{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--line-strong);background:transparent;transition:background .15s}
  .setpip.on.p0{background:var(--p0);border-color:var(--p0)}
  .setpip.on.p1{background:var(--p1);border-color:var(--p1)}

  /* 直前の手 */
  .lastmove{font-size:11.5px;color:var(--muted);background:#FBFBF9;border:1px solid var(--line);border-radius:8px;padding:5px 10px;margin-bottom:10px}

  /* 奪取などのカードピッカー */
  .modal.picker{max-width:480px}
  .picker-head{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .picker-head h3{margin:0}
  .picker-note{font-size:12px;color:var(--muted);margin-bottom:14px}
  .pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:480px){.pick-grid{grid-template-columns:1fr}}
  .pick-card{text-align:left;background:#FBFBF9;border:1px solid var(--line-strong);border-left:4px solid var(--pc);border-radius:10px;padding:12px 14px;cursor:pointer;transition:transform .12s,box-shadow .12s,background .12s;font-family:var(--sans)}
  .pick-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);background:#fff}
  .pick-card:focus-visible{outline:2px solid var(--pc);outline-offset:2px}
  .pc-name{display:block;font-family:var(--serif);font-weight:700;font-size:16px;margin-bottom:4px;color:var(--ink)}
  .pc-desc{display:block;font-size:11px;color:var(--muted);line-height:1.5}

  /* 設定モーダル */
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:14px 0;flex-wrap:wrap}
  .set-label{font-size:13.5px;font-weight:500}
  .set-divider{height:1px;background:var(--line);margin:18px 0}
  .mode-seg.sm{margin:0;padding:3px}
  .mode-seg.sm .seg{padding:7px 13px;font-size:12.5px}
  .seg.locked{opacity:.4;cursor:not-allowed}
  .mode-seg.wrap{flex-wrap:wrap;max-width:300px}
  .name-input{font-family:var(--sans);font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:9px 12px;width:160px;max-width:50%}
  .name-input:focus{outline:2px solid var(--p0);outline-offset:1px;border-color:var(--p0)}
  /* ユーザーバッジ */
  .user-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border-radius:20px;padding:6px 14px;margin-bottom:16px}
  .user-name{font-weight:700;color:var(--ink);font-size:15px}
  .user-id{font-size:12px;color:var(--muted);letter-spacing:.05em}
  .surrender-row{display:flex;justify-content:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}

  /* カード使用：中央大型アニメ */
  .card-use-anim{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:120}
  .cua-card{min-width:200px;max-width:78vw;padding:22px 30px;border-radius:18px;background:#fff;border:3px solid var(--cua);
    box-shadow:0 10px 40px rgba(0,0,0,.25),0 0 0 6px color-mix(in srgb,var(--cua) 18%,transparent);
    text-align:center;transform:scale(.6);opacity:0;animation:cua 1.25s cubic-bezier(.2,1.1,.3,1) forwards}
  .cua-user{font-size:13px;color:var(--ink-soft,#6b6b66);font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
  .cua-name{font-family:var(--serif);font-size:34px;font-weight:800;color:var(--cua);line-height:1.1}
  .cua-desc{margin-top:8px;font-size:12.5px;color:#555;line-height:1.5}
  @keyframes cua{
    0%{transform:scale(.6);opacity:0}
    15%{transform:scale(1.05);opacity:1}
    28%{transform:scale(1)}
    78%{transform:scale(1);opacity:1}
    100%{transform:scale(.95);opacity:0}
  }
  /* 画面シェイク */
  @keyframes shakeAnim{
    0%,100%{transform:translate(0,0)}
    15%{transform:translate(-2.5px,1.5px)}
    30%{transform:translate(2.5px,-1.5px)}
    45%{transform:translate(-2px,-1px)}
    60%{transform:translate(2px,1px)}
    75%{transform:translate(-1px,1px)}
    90%{transform:translate(1px,-0.5px)}
  }
  #app.shake{animation:shakeAnim .42s ease}
  /* 設置マスのフラッシュフェード演出 */
  .cell-place-flash{
    position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:5;
    opacity:.55;animation:cellFlash .7s ease-out forwards;
  }
  @keyframes cellFlash{
    0%{opacity:.6}
    30%{opacity:.45}
    100%{opacity:0}
  }
  /* 結果画面の盤面＋ライン */
  .result-board-wrap{display:flex;justify-content:center;margin:14px 0 6px}
  .result-svg{width:min(320px,82vw);height:auto}
  .result-legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;font-size:12px;color:#555;margin-bottom:6px}
  .result-legend span{display:inline-flex;align-items:center;gap:6px}
  .lg-line{width:20px;height:5px;border-radius:3px;display:inline-block}
  .lg-line.p0{background:var(--p0)} .lg-line.p1{background:var(--p1)}
  .lg-note{color:#999}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   表裏陣取り — ロジック
   ============================================================ */
const MY=0, OPP=1; // オンライン: MY=自分, OPP=相手
const FRONT='f', BACK='b';
function escapeHTML(v){
  return String(v ?? '').replace(/[&<>"']/g, m=>({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[m]));
}
window.escapeHTML = escapeHTML;
const faceLabel=f=>f===FRONT?'表':'裏';
const pname=p=> escapeHTML((S.pnames && S.pnames[p]) ? S.pnames[p] : (p===0?'あなた':'相手'));
const isHuman=p=> S && S.myRole!==null ? p===S.myRole : p===MY;  // 自分のroleと一致するプレイヤーのみ操作可
// 設定は match を跨いで保持（newMatchでリセットしない）
let SETTINGS={ sound:true, anim:true, shake:true };
const APP_VERSION='Ver.1.0.17';

const CARD_INFO={
  shitei:{name:'指定', desc:'次の相手と自分のコイントス結果を、選択した向きに固定する。', prio:6},
  nurikeshi:{name:'色抜き', desc:'相手のコイン1枚を選び、色をなくす。そのコインは両者のコイン扱いになり、常に自分のコインとして認識される。', prio:5},
  kakumei:{name:'革命', desc:'盤面上のすべてのコインを表向きにする。', prio:4},
  ido:{name:'移動', desc:'自分のコイン1枚を縦横斜めどちらかに1マス、空きマスへ移動させる。', prio:3},
  kagikake:{name:'鍵掛け', desc:'自分のコイン1枚に鍵をかける。対象のコインはあらゆるカード効果の対象にならず、状態が変化しない。', prio:7},
  fukusei:{name:'複製', desc:'自分のカード1枚を選び、複製する。同じカードが手札に2枚になる。', prio:2},
  uragaeshi:{name:'裏返し', desc:'相手のコイン1枚を裏返す。そのコインは次の自分のターンまでロックされ、状態が変化しない。', prio:5},
  teitai:{name:'停滞', desc:'相手の未使用カード1枚を選ぶ。自分の2回目のターン開始時まで、相手はそのカードを使用できない。', prio:5},
  chudan:{name:'中断', desc:'どちらかが一列以上揃っている時のみ使用可。自分の未使用カードを全て捨て、ゲームを即座に終了する。', prio:2},
};
const ALL_CARDS=['shitei','nurikeshi','kakumei','ido','kagikake','fukusei','uragaeshi','teitai','chudan'];

/* ---- ライン列挙（検証済み：4行+4列+6斜=14） ---- */
function buildLines(){
  const L=[];
  for(let r=0;r<4;r++) L.push([0,1,2,3].map(c=>r*4+c));
  for(let c=0;c<4;c++) L.push([0,1,2,3].map(r=>r*4+c));
  for(const [dr,dc] of [[1,1],[1,-1]]){
    for(let r=0;r<4;r++) for(let c=0;c<4;c++){
      const pr=r-dr, pc=c-dc;
      if(pr>=0&&pr<4&&pc>=0&&pc<4) continue;
      const cells=[]; let rr=r,cc=c;
      while(rr>=0&&rr<4&&cc>=0&&cc<4){ cells.push(rr*4+cc); rr+=dr; cc+=dc; }
      if(cells.length>=3) L.push(cells);
    }
  }
  return L;
}
const LINES=buildLines();

function runsForPlayer(board,line,p,scoring){
  const out=[]; let i=0;
  const belongs=x=>x&&(x.owner===p||x.shared||x.type==='puppet');
  while(i<line.length){
    const c=board[line[i]];
    if(!belongs(c)){ i++; continue; }
    let j=i+1;
    while(j<line.length){ const x=board[line[j]]; if(belongs(x)&&x.face===c.face) j++; else break; }
    const cells=line.slice(i,j), len=j-i;
    if(len>=3){
      const hasPuppet=cells.some(idx=>board[idx]&&board[idx].type==='puppet');
      if(!(scoring&&hasPuppet)) out.push({len,cells,hasPuppet});
    }
    i=j;
  }
  return out;
}
function boardScore(board){
  const s=[0,0];
  for(const p of [0,1]) for(const line of LINES) for(const r of runsForPlayer(board,line,p,true)){
    s[p]+=(r.len-2)*3;
  }
  return s;
}
function lineCount(board){
  const c=[0,0];
  for(const p of [0,1]) for(const line of LINES){
    for(const r of runsForPlayer(board,line,p,true)){
      let cnt0=0, cnt1=0;
      for(const idx of r.cells){
        const coin=board[idx];
        if(!coin||coin.shared||coin.type==='puppet') continue;
        if(coin.owner===0) cnt0++; else cnt1++;
      }
      const dominant = cnt0===0&&cnt1===0 ? null : (cnt0>=cnt1?0:1);
      if(dominant===null||dominant===p) c[p]+=(r.len-2);
    }
  }
  return c;
}
function winningCells(board){
  const set=new Set();
  for(const p of [0,1]) for(const line of LINES) for(const r of runsForPlayer(board,line,p,true)) r.cells.forEach(c=>set.add(c));
  return set;
}
function setCounts(board){ return lineCount(board); }
function gameEnds(board){ const c=lineCount(board); return c[0]>=3 || c[1]>=3; }
function anyThree(board){
  for(const p of [0,1]) for(const line of LINES) if(runsForPlayer(board,line,p,true).length) return true;
  return false;
}
function scoringRuns(board){
  const runs=[];
  for(const p of [0,1]) for(const line of LINES) for(const r of runsForPlayer(board,line,p,true)){
    runs.push({player:p, cells:r.cells.slice(), len:r.len});
  }
  return runs;
}
const cloneBoard=b=>b.map(c=>c?{
  owner: c.owner ?? null,
  face: c.face ?? null,
  shared: !!c.shared,
  locked: !!c.locked,
  type: c.type ?? null,
  tempLockFor: c.tempLockFor ?? null,
  tempLockTurns: c.tempLockTurns ?? null
}:null);
const emptyCells=b=>{const a=[];for(let i=0;i<16;i++) if(!b[i]) a.push(i); return a;};
const ownCoins=(b,p)=>{const a=[];for(let i=0;i<16;i++){const c=b[i]; if(c&&(c.owner===p||c.shared||c.type==='puppet')) a.push(i);} return a;};
const toss=()=>Math.random()<.5?FRONT:BACK;
const neighbors=i=>{const r=Math.floor(i/4),c=i%4,a=[];if(r>0)a.push(i-4);if(r<3)a.push(i+4);if(c>0)a.push(i-1);if(c<3)a.push(i+1);return a;};
const neighbors8=i=>{const r=Math.floor(i/4),c=i%4,a=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(dr===0&&dc===0)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<4&&nc>=0&&nc<4)a.push(nr*4+nc);}return a;};

/* ============================================================
   ゲーム状態
   ============================================================ */
let S=null;
function newMatch(){
  S={
    phase:'title',
    gameIndex:0,
    totals:[0,0],
    gameLog:[],
    parent:null,
    current:null,
    board:Array(16).fill(null),
    coins:[8,8],
    hands:[[],[]],
    designate:[null,null],
    sel:null,
    pending:null,
    over:false,
    lastBreakdown:null,
    busy:false,
    pnames:[null,null],
    surrenderVotes:[null,null],
    cardLocks:[],
    roomId:null,
    myRole:null,
    lastActionId:null,
    _tossFired:false,    // 親決めトス実行済みフラグ（多重発火防止）
    _tossTimer:null,     // 自動トスの保留中タイマーID
  };
}

function startGame(){
  S.board=Array(16).fill(null);
  S.coins=[8,8];
  S.hands=[[],[]];
  S.designate=[null,null];
  S.pending=null; S.over=false; S.busy=false; S.lastMove=null;
  S.surrenderVotes=[null,null];
  S.cardLocks=[];
  S.flipCooldown=[0,0];
  if(S.gameIndex===0){
    S.phase='toss'; render(); return;
  } else {
    const prev=S.gameLog[S.gameIndex-1];
    if(prev.score[0]===prev.score[1]){
      S.parent = prev.parent===0?1:0;
    } else {
      S.parent = prev.score[0]<prev.score[1]?0:1;
    }
    beginSelect();
  }
}
const SELECT_COUNT=6;
function buildSelectOrder(parent){
  const order=[];
  let t=parent;
  for(let k=0;k<SELECT_COUNT;k++){ order.push(t); t=t===0?1:0; }
  return order;
}
function enterSelect(parent, shouldRender=true){
  S.parent = parent;
  S.sel={available:new Set(ALL_CARDS), order:buildSelectOrder(parent), step:0};
  S.phase='select';
  S.busy=false;
  if(shouldRender) render();
}
function beginSelect(){
  enterSelect(S.parent, true);
}

/* ============================================================
   カード選択
   ============================================================ */
function pickCard(cardId){
  if(S.phase!=='select') return;
  const who=S.sel.order[S.sel.step];
  if(!isHuman(who)) return;
  if(!S.sel.available.has(cardId)) return;
  commitPick(cardId);
}
function commitPick(cardId){
  if(!S.sel || S.phase!=='select'){
    // select フェーズ未準備で呼ばれた場合は安全に無視。
    // （通常は _processRecvQueue のゲートで待つため到達しないが、二重防御）
    return;
  }
  const who=S.sel.order[S.sel.step];
  S.sel.available.delete(cardId);
  S.hands[who].push(cardId);
  sfx('pick');
  if(who===S.myRole){
    // 最初の pick（step===0）には現在の gameIndex を付与する。
    // 受信側が result カウントダウン中などで前のゲームに留まっている場合、
    // この forGameIndex を見て nextGame() で追いついてから処理できる。
    // （Firestore の lastAction 上書き対策として、ゲーム遷移を別アクションにせず
    //   pick に相乗りさせることで連続送信による取りこぼしを避ける）
    const payload={type:'pick', card:cardId};
    if(S.sel.step===0) payload.forGameIndex=S.gameIndex;
    FB.sendAction(payload);
  }
  S.sel.step++;
  if(S.sel.step>=SELECT_COUNT){
    S.current = S.parent;
    S.phase='play';
    render();
    return;
  }
  render();
}

/* ============================================================
   行動の適用
   ============================================================ */
function placeCoin(player, cell, face){
  S.board[cell]={owner:player,face};
  S.coins[player]--;
  S.designate[player]=null;
  S.placeFx={cell, player};
  sfx('place'); shakeScreen();
}
function afterAction(actionEndsGame=false){
  const ends=gameEnds(S.board);
  if(ends || S._justPlacedEighth || actionEndsGame){
    S._justPlacedEighth=false;
    endGame();
    return true;
  }
  S._justPlacedEighth=false;
  if(S.flipCooldown && S.flipCooldown[S.current]>0){
    S.flipCooldown[S.current]--;
  }
  S.current = S.current===0?1:0;
  releaseLocksFor(S.current);
  render();
  return false;
}
function releaseLocksFor(p){
  let released=false;
  if(S.cardLocks&&S.cardLocks.length){
    for(const l of S.cardLocks){ if(l.releaseFor===p) l.turns--; }
    const before=S.cardLocks.length;
    S.cardLocks=S.cardLocks.filter(l=>l.turns>0);
    if(S.cardLocks.length<before) released=true;
  }
  for(const c of S.board){
    if(c && c.tempLockFor===p){ c.tempLockTurns--; if(c.tempLockTurns<=0){ delete c.locked; delete c.tempLockFor; delete c.tempLockTurns; released=true; } }
  }
  if(released) toastMsg('ロックが解除されました');
}
function lockedCount(player,card){
  return (S.cardLocks||[]).filter(l=>l.owner===player&&l.card===card).length;
}

/* ============================================================
   得点計算・ゲーム終了
   ============================================================ */
function endGame(){
  S.over=true; S.busy=false; S.pending=null;
  clearTimeout(S._resultTimer);
  if(window._clearTurnWatchdog) window._clearTurnWatchdog();
  const bs=boardScore(S.board);
  const cardPts=[S.hands[0].length, S.hands[1].length];
  const total=[bs[0]+cardPts[0], bs[1]+cardPts[1]];
  S.totals[0]+=total[0]; S.totals[1]+=total[1];
  const rec={parent:S.parent, board:bs, cards:cardPts, score:total,
    snapshot:cloneBoard(S.board),
    runs:scoringRuns(S.board),
    sets:setCounts(S.board)
  };
  S.gameLog[S.gameIndex]=rec;
  S.lastBreakdown=rec;
  S.phase='result';
  sfx('end');
  render();
  if(window.FB && FB.syncState){
    setTimeout(()=>FB.syncState('result'), 0);
  }
}
function nextGame(){
  S.gameIndex++;
  if(S.gameIndex>=3){ S.phase='final'; render(); return; }
  startGame();
}

/* ============================================================
   人間の操作フロー
   ============================================================ */
function humanAction(type, fixedTossResult=null){
  if(S.phase!=='play'||!isHuman(S.current)||S.busy) return;
  const p=S.current;
  if(type==='place'){
    if(S.coins[p]<=0 || emptyCells(S.board).length===0) return;
    if(S.designate[p]){
      S.pending={type:'placeCell', face:S.designate[p], designated:true};
      render();
    } else {
      doToss(face=>{
        S.pending={type:'placeCell', face};
        render();
      }, fixedTossResult);
    }
  } else if(type==='flip'){
    if(ownCoins(S.board,p).length===0) return;
    if(S.flipCooldown&&S.flipCooldown[p]){ toastMsg('裏返しは前回使用から1ターン空ける必要があります'); return; }
    S.pending={type:'flip'}; render();
  }
}
function clickCard(cardId){
  if(S.phase!=='play'||!isHuman(S.current)||S.busy) return;
  if(S.pending) return;
  const p=S.current;
  if(!S.hands[p].includes(cardId)) return;
  if(!cardUsable(p,cardId)) return;
  startCardUse(cardId);
}
function startCardUse(cardId){
  const p=S.current;
  switch(cardId){
    case 'kakumei':
      consumeCard(p,'kakumei');
      S.board.forEach(c=>{if(c && !c.locked && c.type!=='puppet') c.face=FRONT;});
      sfx('card'); setLastMove(`${pname(p)}：革命`);
      showCardUse(p,'kakumei'); shakeScreen();
      toastMsg('革命：すべて表になった');
      finishLocalAction({type:'card', card:'kakumei'}, false, 'card:kakumei'); break;
    case 'chudan':
      if(!anyThree(S.board)){
        toastMsg('中断は、どちらかが一列以上揃っている時のみ使用できます');
        return;
      }
      consumeCardUseAnim(p,'chudan');
      S.hands[p]=[];
      sfx('card'); setLastMove(`${pname(p)}：中断`);
      toastMsg('中断：ゲームを終了します');
      finishLocalAction({type:'card', card:'chudan', forceEnd:true}, true, 'card:chudan'); break;
    case 'shitei':
      S.pending={type:'shitei', card:'shitei'}; render(); break;
    case 'nurikeshi':
      S.pending={type:'nurikeshi', card:'nurikeshi'}; render(); break;
    case 'ido':
      S.pending={type:'moveFrom', card:'ido'}; render(); break;
    case 'kagikake':
      S.pending={type:'kagikake', card:'kagikake'}; render(); break;
    case 'uragaeshi':
      S.pending={type:'uragaeshi', card:'uragaeshi'}; render(); break;
    case 'teitai':
      teitaiFlow(p); break;
    case 'fukusei':
      duplicateFlow(p); break;
  }
}
function consumeCardUseAnim(p,cardId){ consumeCard(p,cardId); showCardUse(p,cardId); shakeScreen(); }
function consumeCard(player,cardId){
  const i=S.hands[player].indexOf(cardId);
  if(i>=0) S.hands[player].splice(i,1);
}

function clickCell(idx){
  if(!isHuman(S.current)||S.busy||!S.pending) return;
  const me=S.current, opp=me^1, pd=S.pending, cell=S.board[idx];
  if(pd.type==='placeCell'){
    if(cell) return;
    placeCoin(me, idx, pd.face);
    if(S.coins[me]===0) S._justPlacedEighth=true;
    setLastMove(`${pname(me)}：${faceLabel(pd.face)}を配置`);
    S.pending=null;
    finishLocalAction({type:'place', cell:idx, face:pd.face, tossed: !pd.designated}, false, 'place');
  } else if(pd.type==='flip'){
    if(!cell||cell.type==='puppet'||cell.locked) return;
    if(!(cell.owner===me||cell.shared)) return;
    cell.face = cell.face===FRONT?BACK:FRONT;
    if(!S.flipCooldown) S.flipCooldown=[0,0];
    S.flipCooldown[me]=2;
    sfx('flip'); shakeScreen(); setLastMove(`${pname(me)}：コインを裏返した`);
    S.pending=null;
    finishLocalAction({type:'flip', cell:idx}, false, 'flip');
  } else if(pd.type==='nurikeshi'){
    if(!cell||cell.owner!==opp||cell.locked||cell.type==='puppet'||cell.shared) return;
    consumeCardUseAnim(me,'nurikeshi');
    cell.shared=true;
    sfx('card'); setLastMove(`${pname(me)}：色抜き`);
    toastMsg('色抜き：相手コインを両者のコインにした');
    S.pending=null;
    finishLocalAction({type:'card', card:'nurikeshi', cell:idx}, false, 'card:nurikeshi');
  } else if(pd.type==='uragaeshi'){
    if(!cell||cell.owner!==opp||cell.locked||cell.type==='puppet') return;
    consumeCardUseAnim(me,'uragaeshi');
    cell.face = cell.face===FRONT?BACK:FRONT;
    cell.locked=true; cell.tempLockFor=me; cell.tempLockTurns=1;
    sfx('flip'); setLastMove(`${pname(me)}：裏返し`);
    toastMsg('裏返し：相手コインを裏返してロックした');
    S.pending=null;
    finishLocalAction({type:'card', card:'uragaeshi', cell:idx}, false, 'card:uragaeshi');
  } else if(pd.type==='kagikake'){
    if(!cell||cell.type==='puppet'||cell.locked) return;
    if(!(cell.owner===me||cell.shared)) return;
    consumeCardUseAnim(me,'kagikake');
    cell.locked=true;
    sfx('card'); setLastMove(`${pname(me)}：鍵掛け`);
    toastMsg('鍵掛け：このコインは効果を受けず変化しない');
    S.pending=null;
    finishLocalAction({type:'card', card:'kagikake', cell:idx}, false, 'card:kagikake');
  } else if(pd.type==='moveFrom'){
    if(!cell||cell.type==='puppet'||cell.locked) return;
    if(!(cell.owner===me||cell.shared)) return;
    const dests=neighbors8(idx).filter(n=>!S.board[n]);
    if(dests.length===0){ toastMsg('そのコインは移動できません'); return; }
    S.pending={type:'moveTo', from:idx, card:'ido'}; render();
  } else if(pd.type==='moveTo'){
    if(cell) return;
    if(!neighbors8(pd.from).includes(idx)) return;
    consumeCardUseAnim(me,'ido');
    S.board[idx]=S.board[pd.from]; S.board[pd.from]=null;
    sfx('card'); setLastMove(`${pname(me)}：移動`);
    S.pending=null;
    finishLocalAction({type:'card', card:'ido', from:pd.from, to:idx}, false, 'card:ido');
  }
}
function chooseDesignate(face){
  if(!S.pending||S.pending.type!=='shitei') return;
  const p=S.current;
  consumeCardUseAnim(p,'shitei');
  S.designate[0]=face;
  S.designate[1]=face;
  S.pending=null;
  sfx('card'); setLastMove(`${pname(p)}：指定（${faceLabel(face)}）`);
  toastMsg(`指定：次の相手と自分のコイントス結果を${faceLabel(face)}に固定`);
  finishLocalAction({type:'card', card:'shitei', face}, false, 'card:shitei');
}
function duplicateFlow(p){
  cardPickerModal({
    title:'複製  複製する自分のカード',
    note:'選んだカードと同じカードが手札に1枚追加されます。',
    cards:S.hands[p].filter(c=>c!=='fukusei').length ? S.hands[p].filter(c=>c!=='fukusei') : S.hands[p].slice(),
    side:p,
    onPick:(dupId)=>{
      consumeCardUseAnim(p,'fukusei');
      S.hands[p].push(dupId);
      sfx('card'); setLastMove(`${pname(p)}：複製（${CARD_INFO[dupId].name}）`);
      toastMsg(`複製：「${CARD_INFO[dupId].name}」を複製した`);
      finishLocalAction({type:'card', card:'fukusei', dup:dupId}, false, 'card:fukusei');
    },
    onCancel:()=>{}
  });
}
function teitaiFlow(p){
  const opp=p^1;
  const targets=[...new Set(S.hands[opp])].filter(c=>lockedCount(opp,c)<countCard(opp,c));
  cardPickerModal({
    title:'停滞  使用を止める相手のカード',
    note:'選んだカードは、あなたの2回目のターン開始時まで相手は使えません。',
    cards:targets, side:opp,
    onPick:(lockId)=>{
      consumeCardUseAnim(p,'teitai');
      S.cardLocks.push({owner:opp, card:lockId, releaseFor:p, turns:2});
      sfx('card'); setLastMove(`${pname(p)}：停滞（${CARD_INFO[lockId].name}）`);
      toastMsg(`停滞：相手の「${CARD_INFO[lockId].name}」を止めた`);
      finishLocalAction({type:'card', card:'teitai', lock:lockId}, false, 'card:teitai');
    },
    onCancel:()=>{}
  });
}
function cardPickerModal({title,note,cards,side,onPick,onCancel}){
  const bg=document.createElement('div'); bg.className='modal-bg';
  const chips=cards.map(id=>

function cardUsable(player,cardId){
  const opp=player===0?1:0;
  if(lockedCount(player,cardId)>=countCard(player,cardId)) return false;
  switch(cardId){
    case 'nurikeshi': return S.board.some(c=>c&&c.owner===opp&&!c.locked&&!c.shared&&c.type!=='puppet');
    case 'chudan': return anyThree(S.board);
    case 'kakumei': return true;
    case 'ido': return ownCoins(S.board,player).some(i=>!S.board[i].locked&&S.board[i].type!=='puppet'&&neighbors8(i).some(n=>!S.board[n]));
    case 'kagikake': return ownCoins(S.board,player).some(i=>!S.board[i].locked&&S.board[i].type!=='puppet');
    case 'fukusei': return S.hands[player].length>=1;
    case 'uragaeshi': return S.board.some(c=>c&&c.owner===opp&&!c.locked&&c.type!=='puppet');
    case 'teitai': return S.hands[opp].some(c=>lockedCount(opp,c)<countCard(opp,c));
    case 'shitei': return true;
  }
  return false;
}
function countCard(player,card){ return S.hands[player].filter(c=>c===card).length; }

/*
   通常<script>側から呼ばれる共通アクション確定処理。
   Ver.1.0.15では同名関数をFirebaseのmodule内に置いたため、通常<script>側の
   clickCell/startCardUse から参照できず、コイン配置時にReferenceErrorで停止していた。
   ここに置くことで、盤面更新→終了判定→確定済みgameState送信の順を保つ。
*/
function finishLocalAction(action, actionEndsGame=false, reason='action'){
  const ended = afterAction(!!actionEndsGame);
  if(action && window.FB && FB.sendActionNow){
    FB.sendActionNow({...action, endsGame: ended, finalPhase: S.phase}, reason);
  }
  return ended;
}

function doToss(cb, fixedResult=null){

  sfx('toss');
  const reduce=!animOn();
  let tickTimer=null;
  if(!reduce && SETTINGS.sound){
    let n=0;
    tickTimer=setInterval(()=>{ sfx('tosstick'); if(++n>10) clearInterval(tickTimer); }, 70);
  }

  const ov=document.createElement('div'); ov.className='toss-overlay';
  ov.innerHTML=`<div class="toss-card">
    <div class="toss-coin ${reduce?'':'spin'} coin-toss" style="background:${result===FRONT?'var(--ink)':'#fff'};color:${result===FRONT?'#fff':'var(--ink)'};border:${result===FRONT?'none':'2px solid var(--ink)'}">？</div>
    <div class="toss-label">コイントス…</div></div>`;

}

(function(){
  let _canvas=null, _ctx=null, _particles=[], _raf=null, _stopTimer=null;

  function ensureCanvas(){
    if(_canvas) return;
    _canvas=document.createElement('canvas');
    _canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
    document.body.appendChild(_canvas);
    resize();
    window.addEventListener('resize', resize);
  }
  function resize(){
    if(!_canvas) return;
    _canvas.width=window.innerWidth;
    _canvas.height=window.innerHeight;
  }
  function removeCanvas(){
    if(!_canvas) return;
    window.removeEventListener('resize', resize);
    _canvas.remove(); _canvas=null; _ctx=null;
  }

  function Particle(x, colors, velX, velY){
    this.x=x * window.innerWidth;
    this.y=-10;
    this.w=7+Math.random()*6;
    this.h=4+Math.random()*4;
    this.color=colors[Math.floor(Math.random()*colors.length)];
    this.vx=velX+(Math.random()-0.5)*3;
    this.vy=velY+Math.random()*4;
    this.gravity=0.18+Math.random()*0.1;
    this.angle=Math.random()*Math.PI*2;
    this.spin=(Math.random()-0.5)*0.3;
    this.drift=(Math.random()-0.5)*0.15;
    this.opacity=1;
    this.fade=0.004+Math.random()*0.003;
    this.shape=Math.floor(Math.random()*3);
  }
  Particle.prototype.update=function(){
    this.vy+=this.gravity;
    this.vx+=this.drift;
    this.vx*=0.99;
    this.x+=this.vx;
    this.y+=this.vy;
    this.angle+=this.spin;
    if(this.y > window.innerHeight * 0.85) this.opacity-=this.fade*4;
    else this.opacity-=this.fade*0.3;
  };
  Particle.prototype.draw=function(ctx){
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.opacity);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle=this.color;
    if(this.shape===0) ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
    else if(this.shape===1) ctx.fillRect(-this.w/2,-this.h/4,this.w,this.h/2);
    else ctx.fillRect(-this.h/2,-this.h/2,this.h,this.h);
    ctx.restore();
  };

  function loop(){
    if(!_canvas){ _raf=null; return; }
    _ctx=_ctx||_canvas.getContext('2d');
    _ctx.clearRect(0,0,_canvas.width,_canvas.height);
    _particles=_particles.filter(p=>p.opacity>0 && p.y<_canvas.height+20);
    for(const p of _particles){ p.update(); p.draw(_ctx); }
    if(_particles.length>0) _raf=requestAnimationFrame(loop);
    else { _raf=null; removeCanvas(); }
  }

  function spawn(x, count, colors, velX, velY){
    for(let i=0;i<count;i++) _particles.push(new Particle(x, colors, velX, velY));
  }

  window._confettiStop=function(){
    if(_stopTimer){ clearInterval(_stopTimer); _stopTimer=null; }
    _particles=[];
  };

  window.fireConfetti=function(winner){
    if(!animOn()) return;
    const P0=['#2E4B8F','#4866B0','#6E86C8','#A9BBE0'];
    const P1=['#B14A33','#CE6147','#E0856E','#E6B3A4'];
    const win=winner===0?P0:P1, lose=winner===0?P1:P0;
    const colors=[...win,...win,...win,lose[0],lose[2],'#FFD700','#FFFFFF'];
    ensureCanvas(); if(!_raf) _raf=requestAnimationFrame(loop);
    spawn(0.05, 40, colors, 8, 6);
    spawn(0.95, 40, colors, -8, 6);
    setTimeout(()=>{ spawn(0.05,30,colors,7,5); spawn(0.95,30,colors,-7,5); },400);
  };

  window.fireFinalConfetti=function(winner){
    if(!animOn()) return;
    if(_stopTimer){ clearInterval(_stopTimer); _stopTimer=null; }
    const P0=['#2E4B8F','#4866B0','#6E86C8','#A9BBE0','#C5D3EE'];
    const P1=['#B14A33','#CE6147','#E0856E','#E6B3A4','#F5D5CB'];
    const GOLD=['#FFD700','#FFC200','#FFE566'];
    const SILVER=['#E8E8E8','#C8C8C8'];
    const winColors=winner===0?P0:P1, loseColors=winner===0?P1:P0;
    const colors=[...winColors,...winColors,...winColors,...GOLD,...SILVER,loseColors[0],loseColors[2]];
    ensureCanvas(); if(!_raf) _raf=requestAnimationFrame(loop);

    spawn(0.2, 60, colors, (Math.random()-0.5)*2, 5+Math.random()*4);
    spawn(0.5, 60, colors, (Math.random()-0.5)*2, 5+Math.random()*4);
    spawn(0.8, 60, colors, (Math.random()-0.5)*2, 5+Math.random()*4);
    setTimeout(()=>{
      spawn(0.35,50,colors,(Math.random()-0.5)*2,5+Math.random()*3);
      spawn(0.65,50,colors,(Math.random()-0.5)*2,5+Math.random()*3);
    },350);

    let elapsed=0;
    _stopTimer=setInterval(()=>{
      elapsed+=130;
      const x=0.05+Math.random()*0.9;
      spawn(x, 12, colors, (Math.random()-0.5)*1.5, 4+Math.random()*5);
      if(elapsed>=3500){ clearInterval(_stopTimer); _stopTimer=null; }
    },130);
  };
})();

let AC=null;
function ensureAudio(){
  if(AC) { if(AC.state==='suspended') AC.resume(); return; }
  try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; }
}
function blip(freq,dur,type='sine',vol=0.18,delay=0,glideTo=null){
  if(!AC) return;
  const t0=AC.currentTime+delay;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t0);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(AC.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
function sfx(name){
  if(!SETTINGS.sound) return;
  ensureAudio(); if(!AC) return;
  switch(name){
    case 'place': blip(420,0.09,'triangle',0.2); blip(210,0.12,'sine',0.12,0.01); break;
    case 'flip':  blip(520,0.07,'square',0.10); blip(700,0.09,'square',0.10,0.06); break;
    case 'toss':  blip(300,0.28,'sine',0.03,0,760); break;
    case 'card':  blip(660,0.07,'triangle',0.14); blip(880,0.07,'triangle',0.13,0.05); blip(1180,0.10,'triangle',0.12,0.10); break;
    case 'click': blip(560,0.05,'sine',0.10); break;
    case 'pick':  blip(740,0.06,'triangle',0.12); blip(990,0.08,'triangle',0.11,0.04); break;
    case 'tosstick': blip(900,0.025,'square',0.0125); break;
    case 'win':   [523,659,784,1047].forEach((f,i)=>blip(f,0.5,'triangle',0.16,i*0.10)); break;
    case 'draw':  blip(440,0.25,'sine',0.14); blip(440,0.25,'sine',0.12,0.18); break;
    case 'end':   blip(392,0.4,'sine',0.14); blip(294,0.5,'sine',0.13,0.12); break;
    case 'unlock':[330,494,659,988].forEach((f,i)=>blip(f,0.3,'square',0.12,i*0.07)); break;
  }
}

// 親決めコイントスの実行（p0のみ）。多重実行を防止する。
async function doParentToss(){
  if(S._tossFired) return;
  if(S.phase!=='toss') return; // 既に進行済みなら実行しない
  S._tossFired = true;
  if(S._tossTimer){ clearTimeout(S._tossTimer); S._tossTimer=null; }
  const result = Math.random()<0.5 ? 0 : 1; // 0=p0が親, 1=p1が親

  // parentToss は lastAction に入れない。
  // lastAction は1枠しかなく、直後の pick で上書きされるため、
  // 親決め結果とカード選択状態は gameState 本体に保存して同期する。
  try {
    if(window.FB && FB.commitParentToss){
      await FB.commitParentToss(result);
    } else {
      enterSelect(result, true);
    }
    toastMsg(`${pname(S.parent)} が親になりました`);
  } catch(e){
    console.error('親決め結果の保存に失敗', e);
    S._tossFired = false;
    toastMsg('親決め結果の同期に失敗しました');
    render();
  }
}

function renderPlay(){
  const setCells=winningCells(S.board);
  const win=S.over?setCells:new Set();
  let cellsHtml='';
  for(let i=0;i<16;i++){
    const c=S.board[i];
    let cls='cell';
    const pd=S.pending;
    if(isHuman(S.current)&&!S.busy&&pd){
      const me=S.current, opp=me^1;
      const isMine=c&&(c.owner===me||c.shared);
      const sel=` selectable-p${me}`;
      if(pd.type==='placeCell'&&!c) cls+=sel;
      if(pd.type==='flip'&&isMine&&c.type!=='puppet'&&!c.locked) cls+=sel;
      if(pd.type==='nurikeshi'&&c&&c.owner===opp&&!c.locked&&c.type!=='puppet'&&!c.shared) cls+=' target';
      if(pd.type==='uragaeshi'&&c&&c.owner===opp&&!c.locked&&c.type!=='puppet') cls+=' target';
      if(pd.type==='kagikake'&&isMine&&c.type!=='puppet'&&!c.locked) cls+=sel;
      if(pd.type==='moveFrom'&&isMine&&c.type!=='puppet'&&!c.locked&&neighbors8(i).some(n=>!S.board[n])) cls+=sel;
      if(pd.type==='moveTo'&&!c&&neighbors8(pd.from).includes(i)) cls+=sel;
    }
    if(win.has(i)) cls+=' win';
    else if(!S.over && setCells.has(i)) cls+=' setdone';
    let coin='';
    if(c){
      if(c.type==='puppet'){
        coin=`<div class="coin puppet${c.locked?' locked':''}" title="木偶コイン（両者のコイン・点数なし）">偶</div>`;
      } else {
        const ownerCls = c.shared ? 'shared' : 'p'+c.owner;
        const faceCls = c.face===FRONT?'front':'back';
        coin=`<div class="coin ${ownerCls} ${faceCls}${c.locked?' locked':''}"${c.shared?' title="共有コイン（両者のコイン）"':''}${c.locked?' title="鍵掛け（効果を受けない）"':''}>${faceLabel(c.face)}</div>`;
      }
    }
    cellsHtml+=`<div class="${cls}" data-cell="${i}">${coin}</div>`;
  }
  const panel=(p)=>{
    const isDesig=S.designate[p];
    const interactive = isHuman(p) && S.current===p;
    const lockBudget={};
    (S.cardLocks||[]).forEach(l=>{ if(l.owner===p) lockBudget[l.card]=(lockBudget[l.card]||0)+1; });
    const hand=S.hands[p].map(id=>{
      const tip=CARD_INFO[id].name+'：'+CARD_INFO[id].desc;
      const isLocked = lockBudget[id]>0;
      if(isLocked) lockBudget[id]--;
      if(isLocked){
        return `<span class="card-chip locked-card" title="裏返しでロック中：${tip}">🔒${CARD_INFO[id].name}</span>`;
      }
      if(interactive){
        const usable=S.phase==='play'&&!S.busy&&!S.pending&&cardUsable(p,id);
        const dead=S.phase==='play'&&!S.pending&&!usable;
        return `<button class="card-chip ${usable?'usable':''} ${dead?'dead':''}" data-usecard="${id}" title="${tip}">${CARD_INFO[id].name}</button>`;
      }
      return `<span class="card-chip" title="${tip}">${CARD_INFO[id].name}</span>`;
    }).join('') || '<span class="pmeta">なし</span>';
    const sets=setCounts(S.board)[p];
    const pips=[0,1,2].map(i=>`<span class="setpip ${i<sets?'on p'+p:''}"></span>`).join('');
    return `<div class="panel ${S.current===p?'active a'+p:''}">
      <div class="panel-head">
        <span class="pname"><span class="dot p${p}"></span>${pname(p)}</span>
        ${S.parent===p?'<span class="badge oya">親・先攻</span>':'<span class="badge">後攻</span>'}
      </div>
      <div class="pmeta">残りコイン ${S.coins[p]} 枚</div>
      <div class="setrow"><span class="setlabel">3組まで</span>${pips}</div>
      <div class="hand">${hand}</div>
      ${isDesig?`<div class="desig">指定中：次の配置は${faceLabel(isDesig)}</div>`:''}
    </div>`;
  };

  let actionInner='';
  if(S.busy){
    actionInner=`<div class="thinking"><span class="pip"></span>処理中…</div>`;
  } else if(!isHuman(S.current)){
    actionInner=`<div class="thinking"><span class="pip"></span>${pname(S.current)} の手番です…</div>`;
  } else if(S.pending){
    actionInner=renderPending();
  } else {
    const canPlace=S.coins[S.current]>0&&emptyCells(S.board).length>0;
    const canFlip=ownCoins(S.board,S.current).length>0;
    const flipOnCD=S.flipCooldown&&S.flipCooldown[S.current];
    actionInner=`
      <div class="instruction"><span class="hl p${S.current}">${pname(S.current)}</span> の手番。行動を1つ選んでください。</div>
      <div class="acts">
        <button class="btn" id="act-place" ${canPlace?'':'disabled'}>コインを置く</button>
        <button class="btn ghost" id="act-flip" ${canFlip&&!flipOnCD?'':'disabled'} title="${flipOnCD?'前のターンに使用済み（1ターンのクールダウン中）':''}">裏返す${flipOnCD?' ⏳':''}</button>
      </div>
      <div class="pmeta" style="margin-top:8px">カードは下のパネルの自分の手札から使用できます。</div>`;
  }

  const turnText = isHuman(S.current) ? 'あなたの手番' : `${pname(S.current)} の手番`;
  app.innerHTML=`
    <div class="topbar">
      <span class="game-counter">ゲーム ${S.gameIndex+1} / 3</span>
      <div class="totals">
        <span class="tot"><span class="dot p0"></span>${pname(0)} ${S.totals[0]}</span>
        <span class="tot"><span class="dot p1"></span>${pname(1)} ${S.totals[1]}</span>
        <button class="link" id="ruleslink">ルール</button>
        <button class="iconbtn" id="setbtn" title="詳細設定" aria-label="詳細設定">⚙</button>
      </div>
    </div>
    <div class="board-stage">
      <div class="turn-banner p${S.current}"><span class="tb-dot"></span>${turnText}</div>
      <div class="board turn-p${S.current}">${cellsHtml}</div>
      <div class="actionbar">
        ${S.lastMove?`<div class="lastmove">直前の手：${S.lastMove}</div>`:''}
        ${actionInner}
      </div>
      <div class="panels">${panel(0)}${panel(1)}</div>
      <div class="surrender-row">
        <button class="btn ghost sm" id="surrender-btn">投降を申し出る</button>
      </div>
    </div>`;

  document.getElementById('ruleslink').onclick=showRules;
  document.getElementById('setbtn').onclick=showSettings;
  app.querySelectorAll('.cell').forEach(el=>{
    el.onclick=()=>clickCell(parseInt(el.dataset.cell));
  });
  const pb=document.getElementById('act-place'); if(pb) pb.onclick=()=>humanAction('place');
  const fb=document.getElementById('act-flip'); if(fb) fb.onclick=()=>humanAction('flip');
  const surrb=document.getElementById('surrender-btn'); if(surrb) surrb.onclick=()=>{ if(isHuman(S.current)) askSurrender(S.current); };
  app.querySelectorAll('[data-usecard]').forEach(el=>{
    el.onclick=()=>clickCard(el.dataset.usecard);
  });
  const sf=document.getElementById('desig-front'); if(sf) sf.onclick=()=>chooseDesignate(FRONT);
  const sb=document.getElementById('desig-back'); if(sb) sb.onclick=()=>chooseDesignate(BACK);
  const cancel=document.getElementById('cancel-pending'); if(cancel) cancel.onclick=cancelPending;
  const cancelMv=document.getElementById('cancel-movefrom'); if(cancelMv) cancelMv.onclick=cancelMoveFrom;
  const stage=app.querySelector('.board-stage');
  if(stage && S.pending && isHuman(S.current) && isCancelablePending(S.pending)){
    stage.addEventListener('click',e=>{
      if(e.target===stage) cancelPending();
    });
  }
  if(S.placeFx){
    const fx=S.placeFx; S.placeFx=null;
    const cellEl=app.querySelector(`.cell[data-cell="${fx.cell}"]`);
    if(cellEl) spawnPlaceDots(cellEl, fx.player);
  }
}
function spawnPlaceDots(cellEl, player){
  if(!animOn()) return;
  const color = player===0?'var(--p0)':'var(--p1)';
  const flash=document.createElement('div'); flash.className='cell-place-flash';
  flash.style.background=color;
  cellEl.appendChild(flash);
  setTimeout(()=>{ if(flash.parentNode) flash.remove(); }, 750);
}
function isCancelablePending(pd){
  return pd && (pd.card || pd.type==='flip' || pd.type==='moveTo' || pd.type==='shitei'
    || ['nurikeshi','uragaeshi','kagikake','moveFrom'].includes(pd.type));
}

function renderPending(){
  const pd=S.pending;
  const cancelBtn=`<div class="acts"><button class="btn ghost sm" id="cancel-pending">キャンセル</button></div>`;
  if(pd.type==='placeCell')
    return `<div class="instruction">${pd.designated?'指定により ':''}<span class="hl">${faceLabel(pd.face)}</span> を置きます。盤面の空きマスを選んでください。</div>`;
  if(pd.type==='flip')
    return `<div class="instruction">裏返す<span class="hl">自分のコイン</span>を盤面から選んでください。</div>${cancelBtn}`;
  if(pd.type==='nurikeshi')
    return `<div class="instruction">色を抜く<span class="hl">相手のコイン</span>を選んでください。両者のコインになります。</div>${cancelBtn}`;
  if(pd.type==='uragaeshi')
    return `<div class="instruction">裏返す<span class="hl">相手のコイン</span>を選んでください。次のあなたの手番までロックされます。</div>${cancelBtn}`;
  if(pd.type==='kagikake')
    return `<div class="instruction">鍵をかける<span class="hl">自分のコイン</span>を選んでください。効果を受けなくなります。</div>${cancelBtn}`;
  if(pd.type==='moveFrom')
    return `<div class="instruction">移動させる<span class="hl">自分のコイン</span>を選んでください。</div>${cancelBtn}`;
  if(pd.type==='moveTo')
    return `<div class="instruction">移動先の<span class="hl">空きマス</span>（縦横斜め1マス）を選んでください。</div>
      <div class="acts"><button class="btn ghost sm" id="cancel-movefrom">コインを選び直す</button><button class="btn ghost sm" id="cancel-pending">キャンセル</button></div>`;
  if(pd.type==='shitei')
    return `<div class="instruction">次の相手と自分のコイントス結果にする向きを宣言してください。</div>
      <div class="choice-row">
        <button class="btn" id="desig-front">表を指定</button>
        <button class="btn ghost" id="desig-back">裏を指定</button>
      </div>${cancelBtn}`;

function cancelPending(){

  const row=(p)=>`<div class="sb-row">

        <div class="sb-row total"><div>累計</div><div class="num">${pname(0)} ${S.totals[0]}</div><div class="num">${pname(1)} ${S.totals[1]}</div></div>

  let cd = 8;

  clearInterval(S._resultTimer);
  S._resultTimer = setInterval(()=>{
    cd--;

    if(cd<=0){
      clearInterval(S._resultTimer);
      // 両者とも各自カウントダウンで次へ進む。

      if(window.FB && FB.advanceAfterResult){ FB.advanceAfterResult(); }
      else nextGame();

  }, 1000);
}
function resultBoardSVG(rec){
  const board=rec.snapshot||S.board, runs=rec.runs||[];
  const N=4, G=78, PAD=26, R=26;
  const W=PAD*2+G*(N-1), H=W;
  const cx=i=>PAD+(i%4)*G, cy=i=>PAD+Math.floor(i/4)*G;
  const gameWinner = rec.score[0]===rec.score[1] ? null : (rec.score[0]>rec.score[1]?0:1);
  const WIN_FILL_0='#E7ECF6', WIN_FILL_1='#F7E9E4';
  let cells='';
  for(let i=0;i<16;i++){
    const c=board[i];
    let cellFill='none';
    if(gameWinner!==null && c && (c.owner===gameWinner || c.shared)){
      cellFill = gameWinner===0 ? WIN_FILL_0 : WIN_FILL_1;
    }
    cells+=`<rect x="${cx(i)-G/2}" y="${cy(i)-G/2}" width="${G}" height="${G}" fill="${cellFill}" stroke="var(--line)" stroke-width="1"/>`;
  }
  let coins='';
  const COL0='#2E4B8F', COL1='#B14A33', COL_SHARED='#7A4F9E';
  for(let i=0;i<16;i++){ const c=board[i]; if(!c) continue;
    const isFront = c.face===FRONT;
    const faceTxt = isFront?'表':'裏';
    let circleFill, circleStroke, strokeW, textCol;
    if(c.type==='puppet'){
      circleFill='#EDEBE4'; circleStroke='#B6B5AD'; strokeW=2; textCol='#8C8B83';
    } else {
      const baseCol = c.shared ? COL_SHARED : (c.owner===0 ? COL0 : COL1);
      if(isFront){
        circleFill=baseCol; circleStroke=c.locked?'#C9A227':'rgba(0,0,0,.15)'; strokeW=c.locked?3:1.5; textCol='#fff';
      } else {
        circleFill='#fff'; circleStroke=c.locked?'#C9A227':baseCol; strokeW=c.locked?3:2.5; textCol=baseCol;
      }
    }
    const lockRing = c.locked ? `<circle cx="${cx(i)}" cy="${cy(i)}" r="${R+5}" fill="none" stroke="#C9A227" stroke-width="2" opacity="0.7"/>` : '';
    coins+=`<g>
      ${lockRing}
      <circle cx="${cx(i)}" cy="${cy(i)}" r="${R}" fill="${circleFill}" stroke="${circleStroke}" stroke-width="${strokeW}"/>
      <text x="${cx(i)}" y="${cy(i)+6}" text-anchor="middle" font-size="15" fill="${textCol}" font-family="serif" font-weight="700">${faceTxt}</text>
    </g>`;
  }
  let lines='';
  runs.forEach((run,idx)=>{
    const a=run.cells[0], b=run.cells[run.cells.length-1];
    const col=run.player===0?'var(--p0)':'var(--p1)';
    const off=(run.player===0?-1:1)*4;
    lines+=`<line x1="${cx(a)}" y1="${cy(a)+off}" x2="${cx(b)}" y2="${cy(b)+off}"
        stroke="${col}" stroke-width="7" stroke-linecap="round" opacity="0.78"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="result-svg" xmlns="http://www.w3.org/2000/svg">
    ${cells}${lines}${coins}
  </svg>`;
}
function computeNextParent(){
  const prev=S.lastBreakdown;
  if(prev.score[0]===prev.score[1]) return prev.parent===0?1:0;
  return prev.score[0]<prev.score[1]?0:1;
}

  document.getElementById('rules').onclick=showRules;
}


function buildSurrenderFinal(loserRole, shouldRender=false){
  const winner = loserRole===0 ? 1 : 0;
  S.pending=null;
  S.busy=false;
  S.over=true;
  S._finalReason='surrender';
  while(S.gameLog.length < 3){
    const score = winner===0 ? [9,0] : [0,9];
    S.totals[0]+=score[0];
    S.totals[1]+=score[1];
    S.gameLog.push({
      parent: S.parent ?? 0,
      board: [0,0],
      cards: [0,0],
      score,
      snapshot: cloneBoard(S.board || Array(16).fill(null)),
      runs: [],
      sets: [0,0]
    });
  }
  S.phase='final';
  if(shouldRender) render();
}

    <ul>
      <li><b>指定</b>：次の相手と自分のコイントス結果を、選んだ向きに固定。</li>
      <li><b>色抜き</b>：相手コイン1枚の色をなくし、両者のコインにする（常に自分のコイン扱い）。</li>
      <li><b>革命</b>：盤上の全コインを表にする。</li>
      <li><b>移動</b>：自分のコインを縦横斜めどちらかに1マス、空きマスへ。</li>
      <li><b>鍵掛け</b>：自分のコイン1枚に鍵をかける。効果を受けず状態が変化しない。</li>
      <li><b>複製</b>：自分のカード1枚を複製し、手札に同じカードを増やす。</li>
      <li><b>裏返し</b>：相手のコイン1枚を裏返す。次の自分の手番までロックされ状態が変化しない。</li>
      <li><b>停滞</b>：相手の未使用カード1枚を、自分の2回目の手番開始まで使用不可にする。</li>
      <li><b>中断</b>：どちらかが一列以上揃っている時のみ使用可。自分の全カードを捨て、即終了。</li>
    </ul>
    <h4>終了条件</h4>
    <ul>
      <li>いずれかのプレイヤーが3組（3枚揃い×3）を達成した時点。</li>
      <li>どちらかが8枚目のコインを置いた時点。</li>
      <li>『中断』が使われた時点。</li>
    </ul>
    <h4>得点</h4>
    <ul>
      <li>同じ向き3枚連続＝3点（4枚連続は6点）。複数ラインは別々に加算。</li>
      <li>未使用カード1枚につき1点（『中断』使用者は0点）。</li>
    </ul>
    <div class="close-row"><button class="btn" id="closemodal">閉じる</button></div>
  </div>`;
  bg.onclick=e=>{ if(e.target===bg) bg.remove(); };
  document.body.appendChild(bg);
  document.getElementById('closemodal').onclick=()=>bg.remove();
}

<script type="module">
